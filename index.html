<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Visions Studio</title>
    <link rel="icon" type="image/png" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-9o6hjrus.png">
    <link rel="apple-touch-icon" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-9o6hjrus.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Visions Studio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#08080e">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Variables ── */
        :root {
            --bg:           #08080e;
            --surface:      #0c0c15;
            --surf2:        #111120;
            --surf3:        #19192c;
            --surf4:        #23233a;
            --border:       rgba(255,255,255,0.05);
            --border2:      rgba(255,255,255,0.08);
            --border3:      rgba(255,255,255,0.13);
            --purple:       #8b5cf6;
            --purple-hover: #7c4ef0;
            --purple-dim:   rgba(139,92,246,0.10);
            --purple-ring:  rgba(139,92,246,0.18);
            --pink:         #e84393;
            --pink-dim:     rgba(232,67,147,0.08);
            --pink-border:  rgba(232,67,147,0.18);
            --accent:       #ff0048;
            --text:         #e4e4f0;
            --text2:        #8585a0;
            --text3:        #4a4a62;
            --r:            6px;
            --r-sm:         4px;
            --r-lg:         8px;
            --ease:         cubic-bezier(0.22,1,0.36,1);
            --ease2:        cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Reset ── */
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Figtree', sans-serif;
            font-size: 14px;
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.2); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.4); }

        @keyframes appFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            animation: appFadeIn 0.45s var(--ease2) both;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 272px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: -1px;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, rgba(139,92,246,0.3) 0%, rgba(232,67,147,0.15) 50%, transparent 100%);
            pointer-events: none;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sidebar-foot {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--surface);
        }

        .wordmark {
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            background: linear-gradient(105deg, var(--purple) 0%, var(--pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 18px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 12px rgba(139,92,246,0.25));
        }

        /* ── Fields ── */
        .field { display: flex; flex-direction: column; gap: 6px; }

        .label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.06em;
            text-transform: lowercase;
        }

        /* ── Inputs ── */
        .inp {
            background: var(--surf2);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            color: var(--text);
            font-family: 'Figtree', sans-serif;
            font-size: 13px;
            padding: 0 12px;
            height: 38px;
            width: 100%;
            transition: border-color 0.2s var(--ease2), background 0.2s var(--ease2), box-shadow 0.2s var(--ease2);
            appearance: none;
            -webkit-appearance: none;
        }

        .inp:hover {
            border-color: var(--border3);
            background: var(--surf3);
        }

        .inp:focus {
            outline: none;
            border-color: rgba(139,92,246,0.5);
            background: var(--surf3);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
        }

        .inp::placeholder { color: var(--text3); }
        select.inp { cursor: pointer; }

        textarea.inp {
            height: 110px;
            padding: 10px 12px;
            resize: none;
            line-height: 1.55;
        }

        .inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* ── Notices ── */
        .flash-warn {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.18);
            border-radius: var(--r);
            font-size: 12px;
            color: rgba(180,150,255,0.85);
            line-height: 1.45;
        }

        .flash-warn svg { flex-shrink: 0; margin-top: 1px; }

        /* ── Buttons ── */
        .btn {
            border: none;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            font-size: 13px;
            transition: all 0.15s var(--ease2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active:not(:disabled) { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple) 0%, #a855f7 100%);
            color: #fff;
            height: 40px;
            width: 100%;
            letter-spacing: 0.01em;
            box-shadow: 0 2px 12px rgba(139,92,246,0.25);
            transition: all 0.2s var(--ease2);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--purple-hover) 0%, #9333ea 100%);
            box-shadow: 0 4px 20px rgba(139,92,246,0.35);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop {
            background: var(--accent);
            color: #fff;
            height: 40px;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .btn-stop:hover { opacity: 0.85; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border2);
            padding: 0 12px;
            height: 34px;
            font-size: 12.5px;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            cursor: pointer;
            transition: all 0.15s var(--ease2);
            gap: 6px;
        }

        .btn-ghost:hover {
            background: var(--surf2);
            color: var(--text);
            border-color: var(--border3);
        }

        .btn-ghost:active { transform: scale(0.97); }

        .btn-danger {
            background: var(--accent);
            color: #fff;
            padding: 0 14px;
            height: 34px;
            font-size: 12.5px;
        }

        .btn-danger:hover { opacity: 0.85; }

        .btn-row { display: flex; gap: 8px; }
        .btn-row .btn-primary { flex: 1; }

        .download-btn {
            background: var(--purple-dim);
            color: var(--purple);
            padding: 0 14px;
            height: 34px;
            font-size: 12.5px;
            border: 1px solid rgba(139,92,246,0.18);
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            transition: all 0.15s var(--ease2);
        }

        .download-btn:hover { background: rgba(139,92,246,0.18); color: #fff; }

        /* ── Errors ── */
        .error-box {
            display: flex;
            gap: 10px;
            padding: 11px 13px;
            border-radius: var(--r);
            align-items: flex-start;
        }

        .error-box svg { flex-shrink: 0; margin-top: 1px; }

        .error-api {
            background: var(--purple-dim);
            border: 1px solid rgba(139,92,246,0.18);
        }

        .error-api .error-title { color: var(--purple); }
        .error-api .error-detail { color: rgba(160,130,240,0.75); }

        .error-app {
            background: var(--pink-dim);
            border: 1px solid var(--pink-border);
        }

        .error-app .error-title { color: var(--pink); }
        .error-app .error-detail { color: rgba(232,67,147,0.7); }

        .error-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .error-detail {
            font-size: 12px;
            line-height: 1.4;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 28px 30px;
            height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(ellipse 60% 40% at 70% 10%, rgba(139,92,246,0.04) 0%, transparent 70%);
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .page-title {
            font-family: 'Sora', sans-serif;
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(105deg, var(--text) 40%, var(--text2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-sub {
            font-size: 12px;
            color: var(--text3);
            margin-top: 3px;
            letter-spacing: 0.02em;
        }

        /* ── Gallery ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            touch-action: auto;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes cardOut {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.94); }
        }

        .img-card {
            position: relative;
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--surf2);
            transition: border-color 0.25s var(--ease2), box-shadow 0.25s var(--ease2), transform 0.25s var(--ease);
            animation: cardIn 0.3s var(--ease) both;
        }

        .img-card.removing {
            animation: cardOut 0.25s var(--ease2) both;
            pointer-events: none;
        }

        .img-card:hover {
            border-color: rgba(139,92,246,0.3);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 0 1px rgba(139,92,246,0.08);
            transform: translateY(-2px);
        }

        .img-card.selected {
            border-color: var(--purple);
            box-shadow: 0 0 0 1px var(--purple), 0 0 20px rgba(139,92,246,0.15);
        }

        .img-card.selected:hover {
            box-shadow: 0 0 0 1px var(--purple), 0 8px 28px rgba(0,0,0,0.35), 0 0 20px rgba(139,92,246,0.15);
        }

        .img-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.25s var(--ease2);
            background: linear-gradient(180deg, rgba(8,8,14,0.55) 0%, transparent 40%, transparent 60%, rgba(8,8,14,0.7) 100%);
        }

        .img-card:hover .card-overlay,
        .img-card.selected .card-overlay { opacity: 1; }

        .card-top {
            position: absolute;
            top: 8px; left: 8px; right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .check {
            width: 22px;
            height: 22px;
            border-radius: var(--r-sm);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s var(--ease2);
        }

        .check:active { transform: scale(0.88); }

        .img-card.selected .check {
            background: var(--purple);
            border-color: var(--purple);
        }

        .del-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.75);
            border-radius: var(--r-sm);
            padding: 4px 9px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .del-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .prompt-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 36px 10px 10px;
            background: linear-gradient(transparent, rgba(8,8,14,0.92));
            pointer-events: none;
        }

        .prompt-fade p {
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Empty ── */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 100px 24px;
            text-align: center;
        }

        .empty-icon {
            width: 48px; height: 48px;
            border-radius: var(--r-lg);
            background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(232,67,147,0.08));
            border: 1px solid rgba(139,92,246,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--purple);
            filter: drop-shadow(0 0 8px rgba(139,92,246,0.2));
        }

        .empty p { font-size: 14px; font-weight: 600; color: var(--text2); }
        .empty span { font-size: 12.5px; color: var(--text3); }

        /* ── Drawer ── */
        @keyframes drawerOverlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes drawerSlideIn {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(4,4,8,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: flex-end;
            animation: drawerOverlayIn 0.15s ease both;
        }

        .drawer {
            width: 500px;
            max-width: 100%;
            height: 100%;
            background: var(--surface);
            border-left: 1px solid rgba(139,92,246,0.15);
            display: flex;
            flex-direction: column;
            animation: drawerSlideIn 0.3s var(--ease) both;
            box-shadow: -16px 0 48px rgba(0,0,0,0.4), -1px 0 0 rgba(232,67,147,0.06);
        }

        .drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .drawer-tabs {
            display: flex;
            height: 100%;
            gap: 0;
        }

        .drawer-tab {
            height: 100%;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Figtree', sans-serif;
            color: var(--text3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.2s var(--ease2), border-color 0.2s var(--ease2);
        }

        .drawer-tab:hover { color: var(--text2); }

        .drawer-tab.active {
            color: var(--text);
            border-image: linear-gradient(90deg, var(--purple), var(--pink)) 1;
        }

        .drawer-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            color: var(--text3);
            cursor: pointer;
            transition: all 0.15s var(--ease2);
        }

        .drawer-close:hover { color: var(--text); background: var(--surf2); }

        .drawer-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .drawer-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            background: var(--bg);
        }

        .drawer-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: var(--r-sm);
        }

        .drawer-info {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            font-size: 10.5px;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.05em;
            color: var(--text3);
        }

        .info-value {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.5;
        }

        .info-prompt-box {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid rgba(139,92,246,0.12);
            border-radius: var(--r);
            max-height: 140px;
            overflow-y: auto;
            user-select: text;
            -webkit-user-select: text;
        }

        .info-copy-btn {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple);
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            padding: 0;
            transition: opacity 0.15s;
        }

        .info-copy-btn:hover { opacity: 0.65; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .drawer-foot {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: var(--surface);
        }

        .drawer-foot .btn { flex: 1; height: 38px; }

        .btn-dl {
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .btn-dl:hover { background: var(--purple-hover); }
        .btn-dl:active { transform: scale(0.97); }

        .btn-del-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(239,68,104,0.2);
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .btn-del-outline:hover { background: rgba(255,0,72,0.08); }
        .btn-del-outline:active { transform: scale(0.97); }

        /* ── Confirm modal ── */
        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: overlayIn 0.15s ease both;
        }

        .modal {
            background: var(--surf2);
            border: 1px solid rgba(139,92,246,0.15);
            border-radius: var(--r-lg);
            padding: 24px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.05);
            animation: modalIn 0.2s var(--ease) both;
        }

        .modal-title {
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .modal-body {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

        /* ── Pulse ── */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 2px 12px rgba(139,92,246,0.25); }
            50%       { box-shadow: 0 4px 24px rgba(139,92,246,0.5); }
        }

        .pulse-text { animation: pulse 2s ease-in-out infinite; }
        .faded { opacity: 0.25; pointer-events: none; }
        .btn-primary.loading { animation: pulseGlow 1.8s ease-in-out infinite; }

        /* ── Lightbox ── */
        @keyframes lightboxIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lightboxIn 0.15s ease both;
            cursor: zoom-out;
        }

        .lightbox-overlay img {
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            object-fit: contain;
            border-radius: var(--r);
            cursor: default;
        }

        /* ── Reference images ── */
        .ref-drop {
            border: 1.5px dashed var(--border3);
            border-radius: var(--r);
            padding: 14px;
            cursor: pointer;
            transition: all 0.25s var(--ease2);
            text-align: center;
        }

        .ref-drop:hover {
            border-color: rgba(139,92,246,0.4);
            background: rgba(139,92,246,0.05);
            box-shadow: 0 0 16px rgba(139,92,246,0.06);
        }

        .ref-drop-label {
            font-size: 12px;
            color: var(--text3);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .ref-thumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .ref-thumb {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: var(--r-sm);
            overflow: hidden;
            border: 1px solid var(--border2);
            flex-shrink: 0;
            transition: transform 0.2s var(--ease);
        }

        .ref-thumb:hover { transform: none; }
        .ref-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .ref-thumb-rm {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s var(--ease2);
            cursor: pointer;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            width: 100%;
        }

        .ref-thumb:hover .ref-thumb-rm { opacity: 1; }

        /* ── Tab bar ── */
        .tab-bar { display: none; }

        /* ── Dim hint ── */
        .dim-hint {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            body { overflow: hidden; }
            .app { flex-direction: column; height: 100dvh; }

            .sidebar {
                width: 100%;
                height: calc(100dvh - 56px);
                border-right: none;
                display: none;
            }

            .sidebar.tab-active { display: flex; }

            .main {
                height: calc(100dvh - 56px);
                padding: 18px 14px;
                display: none;
            }

            .main.tab-active { display: block; }

            .sidebar-body { padding: 18px 14px; gap: 16px; }
            .sidebar-foot { padding: 12px 14px; }
            .card-overlay { opacity: 1; }
            .prompt-fade { display: none; }
            .gallery { grid-template-columns: 1fr 1fr; gap: 8px; }
            .main-header { margin-bottom: 16px; }

            .drawer { width: 100%; border-left: none; }

            .tab-bar {
                display: flex;
                height: 56px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
                padding-bottom: env(safe-area-inset-bottom);
                position: relative;
            }

            .tab-bar::before {
                content: '';
                position: absolute;
                top: -1px;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(139,92,246,0.3), rgba(232,67,147,0.2), transparent);
                pointer-events: none;
            }

            .tab-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                border: none;
                background: transparent;
                color: var(--text3);
                font-family: 'Figtree', sans-serif;
                font-size: 10.5px;
                font-weight: 600;
                cursor: pointer;
                transition: color 0.15s var(--ease2);
                letter-spacing: 0.02em;
            }

            .tab-btn.active {
                background: linear-gradient(135deg, var(--purple), var(--pink));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .check { width: 26px; height: 26px; }
            .del-btn { padding: 5px 10px; font-size: 11px; }
            .ref-thumb-rm { opacity: 1; background: rgba(0,0,0,0.5); }
            .img-card:hover { border-color: var(--border); box-shadow: none; transform: none; }
            .neg-prompt-icon { width: 20px; height: 20px; }
        }

        .neg-prompt-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.05em;
            text-transform: lowercase;
            padding: 0;
            width: 100%;
            justify-content: space-between;
            transition: color 0.2s var(--ease2);
        }

        .neg-prompt-toggle:hover { color: var(--text2); }

        .neg-prompt-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            line-height: 1;
            color: var(--text3);
            transition: transform 0.3s var(--ease), border-color 0.2s var(--ease2), color 0.2s var(--ease2);
            flex-shrink: 0;
        }

        .neg-prompt-icon.open {
            transform: rotate(45deg);
            border-color: var(--purple);
            color: var(--purple);
        }

        .neg-prompt-body {
            display: grid;
            grid-template-rows: 0fr;
            opacity: 0;
            transition: grid-template-rows 0.3s var(--ease), opacity 0.25s var(--ease2);
        }

        .neg-prompt-body.open {
            grid-template-rows: 1fr;
            opacity: 1;
        }

        .neg-prompt-inner { overflow: hidden; }
        .neg-prompt-inner textarea { margin-top: 8px; }

        .reuse-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(4,4,8,0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: overlayIn 0.15s ease both;
        }

        .reuse-modal {
            background: var(--surf2);
            border: 1px solid var(--border2);
            border-radius: var(--r-lg);
            padding: 20px;
            width: 300px;
            max-width: calc(100vw - 32px);
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: modalIn 0.2s var(--ease) both;
        }

        .reuse-modal-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .reuse-modal-sub {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 4px;
        }

        .reuse-options {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .reuse-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 7px 8px;
            border-radius: var(--r-sm);
            transition: background 0.12s var(--ease2);
        }

        .reuse-option:hover { background: var(--surf3); }

        .reuse-option input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: var(--purple);
            cursor: pointer;
            flex-shrink: 0;
        }

        .reuse-option-label {
            font-size: 12.5px;
            color: var(--text);
            font-weight: 500;
        }

        .reuse-option-value {
            font-size: 11px;
            color: var(--text3);
            margin-top: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Model registry ── */
    const MODELS = [
        { id: "gemini-3-pro-image",             label: "Gemini 3 Pro Image",  group: "Gemini",     provider: "gemini" },
        { id: "gemini-3.1-flash-image-preview", label: "Gemini 3.1 Flash",    group: "Gemini",     provider: "gemini" },
        { id: "gpt-image-1.5",                  label: "GPT Image 1.5",       group: "OpenAI",     provider: "openai" },
        { id: "midjourney",                     label: "Midjourney",           group: "Midjourney", provider: "midjourney" },
        { id: "bria/image-3.2",                 label: "Bria 3.2",            group: "Bria",       provider: "bria" },
        { id: "flux-2-max",                     label: "Flux 2 Max",          group: "Flux",       provider: "flux" },
        { id: "stability-ai/stable-diffusion-3.5-large", label: "SD 3.5 Large", group: "Stable Diffusion", provider: "sd" },
        { id: "stability-ai/stable-diffusion-3.5-large-turbo", label: "SD 3.5 Large Turbo", group: "Stable Diffusion", provider: "sd" },
        { id: "stability-ai/stable-diffusion-3.5-medium", label: "SD 3.5 Medium", group: "Stable Diffusion", provider: "sd" },
    ];

    const MODEL_MAP = Object.fromEntries(MODELS.map(m => [m.id, m]));

    const OPENAI_SIZES = {
        "gpt-image-1.5":    ["1024x1024", "1536x1024", "1024x1536"],
    };

    const BRIA_RATIOS = ["1:1", "2:3", "3:2", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9"];

    const GEMINI_PRO_RATIOS  = ["1:1", "3:2", "2:3", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9", "21:9"];
    const GEMINI_FLASH_RATIOS = [...GEMINI_PRO_RATIOS, "1:4", "4:1", "1:8", "8:1"];

    const SD_RATIOS = ["1:1", "16:9", "21:9", "2:3", "3:2", "4:5", "5:4", "9:16", "9:21"];

    const MODEL_GROUPS = MODELS.reduce((acc, m) => {
        if (!acc[m.group]) acc[m.group] = [];
        acc[m.group].push(m);
        return acc;
    }, {});

    /* ── Flux dimension helpers ── */
    const clampFluxDim = v => {
        let n = parseInt(v) || 1024;
        if (n > 2048) n = 2048;
        if (n < 64) n = 64;
        n = Math.round(n / 16) * 16;
        return Math.min(2048, n);
    };

    /* ── DB & utilities ── */
    const DB_NAME = "VisionsStudio";
    const STORE = "images";

    const initDB = () => new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            if (!e.target.result.objectStoreNames.contains(STORE))
                e.target.result.createObjectStore(STORE, { keyPath: "id" });
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = () => reject(new Error("couldn't open local storage. private browsing mode might be blocking it"));
    });

    const parseError = (raw, type = "api") => {
        const s = String(raw || "");
        if (type === "app") {
            if (s.includes("KEY & PROMPT")) return { type: "app", title: "hold on", detail: "you need an api key and a prompt before anything happens" };
            return { type: "app", title: "oops", detail: s || "something went wrong on our end" };
        }
        if (s.includes("400")) return { type: "api", title: "bad request", detail: "something in the request was invalid. check your prompt and settings" };
        if (s.includes("401")) return { type: "api", title: "bad key", detail: "that key got rejected. double check it's correct and still active" };
        if (s.includes("403")) return { type: "api", title: "no access", detail: "your key might not have permission for this model" };
        if (s.includes("413")) return { type: "api", title: "too large", detail: "the request was too big, probably a reference image. try a smaller one" };
        if (s.includes("429")) return { type: "api", title: "slow down", detail: "hit a rate limit. wait a sec and try again" };
        if (s.includes("503") || s.includes("504") || s.includes("524")) return { type: "api", title: "server down", detail: "the api is overloaded or temporarily unavailable. wait a minute and try again" };
        if (s.includes("500")) return { type: "api", title: "server error", detail: "something broke on the api side. not you, try again" };
        return { type: "api", title: "something broke", detail: s || "no details available" };
    };

    const urlToDataUrl = async url => {
        try {
            const res = await fetch(url);
            if (!res.ok) return url;
            const blob = await res.blob();
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.onerror = () => resolve(url);
                r.readAsDataURL(blob);
            });
        } catch {
            return url;
        }
    };

    const poll = (fn, check, ms = 4000, signal, maxAttempts = 70) => new Promise((resolve, reject) => {
        let attempts = 0;
        const run = async () => {
            if (signal?.aborted) return reject(new DOMException("Aborted", "AbortError"));
            if (attempts >= maxAttempts) return reject(new Error("timed out waiting. the model might be busy, try again"));
            attempts++;
            try {
                const result = await fn();
                if (check(result)) return resolve(result);
                setTimeout(run, ms);
            } catch (e) { reject(e); }
        };
        run();
    });

    const saveImg = (db, src, prompt, meta = {}) => {
        const img = {
            id: Date.now() + Math.random(),
            src,
            prompt,
            timestamp: new Date().toLocaleString(),
            model: meta.model || null,
            modelLabel: meta.modelLabel || null,
            provider: meta.provider || null,
            ratio: meta.ratio || null,
            size: meta.size || null,
            negativePrompt: meta.negativePrompt || null,
            seed: meta.seed || null,
            steps: meta.steps || null,
            guidance: meta.guidance || null,
        };
        db.transaction(STORE, "readwrite").objectStore(STORE).add(img);
        return img;
    };

    /* ── Provider: Gemini ── */
    const genGemini = async (db, { apiKey, model, prompt, ratio, size, refImages, signal }) => {
        const isFlash = model.includes('flash');
        const imageParts = refImages.map(r => ({ inlineData: { mimeType: r.mediaType, data: r.base64 } }));
        const imageConfig = isFlash ? { aspectRatio: ratio } : { aspectRatio: ratio, imageSize: size };
        const body = {
            contents: [{ role: "user", parts: [...imageParts, { text: prompt }] }],
            generationConfig: {
                responseModalities: ["TEXT", "IMAGE"],
                imageConfig
            }
        };
        const res = await fetch(`https://api.cometapi.com/v1beta/models/${model}:generateContent`, {
            method: "POST", mode: "cors",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify(body), signal
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(`${res.status}: ${d.error?.message || "unknown error"}`);
        }
        const data = await res.json();
        const b64 = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (!b64) {
            const txt = data?.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
            throw new Error(txt ? `model returned text instead of image: "${txt.slice(0, 120)}"` : "model returned no image, try a different prompt");
        }

        return saveImg(db, `data:image/png;base64,${b64}`, prompt, {
            model,
            modelLabel: MODEL_MAP[model]?.label,
            provider: "gemini",
            ratio,
            size: isFlash ? null : size
        });
    };

    /* ── Provider: OpenAI ── */
    const genOpenAI = async (db, { apiKey, model, prompt, openaiSize, signal }) => {
        const body = {
            model,
            prompt,
            n: 1,
            size: openaiSize || "1024x1024"
        };

        const res = await fetch("https://api.cometapi.com/v1/images/generations", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify(body),
            signal
        });

        if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(`${res.status}: ${errorData.error?.message || "unknown error"}`);
        }

        const data = await res.json();
        const item = data?.data?.[0];
        if (!item) return null;

        const src = item.b64_json
            ? `data:image/png;base64,${item.b64_json}`
            : await urlToDataUrl(item.url);

        return src ? saveImg(db, src, prompt, {
            model,
            modelLabel: MODEL_MAP[model]?.label || "OpenAI",
            provider: "openai",
            size: openaiSize
        }) : null;
    };

    /* ── Provider: Midjourney ── */
    const genMidjourney = async (db, { apiKey, prompt, batchSize, mjSpeed, signal, setStatusMsg }) => {
        setStatusMsg("submitting to mj...");
        const baseUrl = mjSpeed === "turbo"
            ? "https://api.cometapi.com/mj-turbo/mj/submit/imagine"
            : mjSpeed === "relax"
            ? "https://api.cometapi.com/mj/submit/imagine"
            : "https://api.cometapi.com/mj-fast/mj/submit/imagine";
        const submitRes = await fetch(baseUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify({ prompt, botType: "MID_JOURNEY" }),
            signal
        });
        if (!submitRes.ok) {
            const err = await submitRes.json().catch(() => ({}));
            throw new Error(`${submitRes.status}: ${err.description || err.error?.message || "unknown error"}`);
        }
        const submitData = await submitRes.json();
        const taskId = submitData.result;
        if (!taskId) throw new Error("midjourney returned no task id");

        const fetchTask = async id => {
            const r = await fetch(`https://api.cometapi.com/mj/task/${id}/fetch`, {
                headers: { "Authorization": `Bearer ${apiKey}` }, signal
            });
            return r.json();
        };

        setStatusMsg("mj is working...");
        const gridResult = await poll(
            () => fetchTask(taskId),
            r => r.status === "SUCCESS" || r.status === "FAILURE",
            5000, signal, 70
        );
        if (gridResult.status === "FAILURE") throw new Error("midjourney generation failed");

        const upscaleButtons = (gridResult.buttons || [])
            .filter(b => /^U[1-4]$/.test(b.label))
            .slice(0, batchSize);

        if (!upscaleButtons.length) {
            const src = await urlToDataUrl(gridResult.imageUrl);
            return [saveImg(db, src, prompt, { model: "midjourney", modelLabel: "Midjourney", provider: "midjourney" })];
        }

        const results = [];
        for (let i = 0; i < upscaleButtons.length; i++) {
            if (signal?.aborted) break;
            const btn = upscaleButtons[i];
            setStatusMsg(`upscaling ${i + 1} of ${upscaleButtons.length}...`);
            const actionRes = await fetch("https://api.cometapi.com/mj/submit/action", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ taskId, customId: btn.customId }),
                signal
            });
            if (!actionRes.ok) {
                const err = await actionRes.json().catch(() => ({}));
                throw new Error(`${actionRes.status}: ${err.error?.message || "unknown error"}`);
            }
            const actionData = await actionRes.json();
            const upscaleId = actionData.result;
            if (!upscaleId) continue;
            const upscaleResult = await poll(
                () => fetchTask(upscaleId),
                r => r.status === "SUCCESS" || r.status === "FAILURE",
                4000, signal, 60
            );
            if (upscaleResult.status === "SUCCESS" && upscaleResult.imageUrl) {
                const src = await urlToDataUrl(upscaleResult.imageUrl);
                results.push(saveImg(db, src, prompt, { model: "midjourney", modelLabel: "Midjourney", provider: "midjourney" }));
            }
        }
        return results;
    };

    /* ── Provider: Bria ── */
    const genBria = async (db, { apiKey, prompt, negativePrompt, ratio, batchSize, briaSteps, briaGuidance, briaSeed, signal }) => {
        const body = { prompt, num_results: batchSize, aspect_ratio: ratio, sync: true, steps_num: briaSteps, text_guidance_scale: briaGuidance };
        if (negativePrompt && negativePrompt.trim()) body.negative_prompt = negativePrompt.trim();
        if (briaSeed !== "" && !isNaN(parseInt(briaSeed))) body.seed = parseInt(briaSeed);
        const res = await fetch("https://api.cometapi.com/bria/text-to-image", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify(body), signal
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(`${res.status}: ${d.error?.message || "unknown error"}`);
        }
        const data = await res.json();
        const results = [];
        for (const item of (data?.result || [])) {
            for (const url of (item.urls || [])) {
                const src = await urlToDataUrl(url);
                results.push(saveImg(db, src, prompt, { model: "bria/image-3.2", modelLabel: "Bria 3.2", provider: "bria", ratio, negativePrompt, seed: item.seed || null, steps: briaSteps, guidance: briaGuidance }));
            }
        }
        return results;
    };

    /* ── Provider: Flux ── */
    const genFlux = async (db, { apiKey, model, prompt, fluxWidth, fluxHeight, signal, setStatusMsg }) => {
        const body = {
            prompt,
            width: parseInt(fluxWidth) || 1024,
            height: parseInt(fluxHeight) || 1024,
            prompt_upsampling: true,
        };

        const res = await fetch(`https://api.cometapi.com/flux/v1/${model}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify(body),
            signal
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(`${res.status}: ${err.error?.message || err.detail || "unknown error"}`);
        }

        const submitData = await res.json();
        const taskId = submitData.id;
        if (!taskId) throw new Error("no task id returned from flux");

        const pollUrl = `https://api.cometapi.com/flux/v1/get_result?id=${taskId}`;
        const MAX_ATTEMPTS = 90;
        let attempts = 0;

        const extractImage = (r) => {
            return r?.data?.result_url
                || r?.data?.data?.result?.sample
                || r?.data?.result?.sample
                || r?.result?.sample
                || null;
        };

        const extractStatus = (r) => {
            return (r?.data?.status || r?.data?.data?.status || r?.status || "").toUpperCase();
        };

        while (attempts < MAX_ATTEMPTS) {
            if (signal?.aborted) throw new DOMException("Aborted", "AbortError");
            attempts++;

            await new Promise(rh => setTimeout(rh, 3000));
            setStatusMsg(`flux is working... (poll ${attempts})`);

            try {
                const pollRes = await fetch(pollUrl, {
                    headers: { "Authorization": `Bearer ${apiKey}` },
                    signal
                });

                if (!pollRes.ok) {
                    if (attempts > 10) throw new Error(`flux polling failed: HTTP ${pollRes.status}`);
                    continue;
                }

                const r = await pollRes.json();
                const status = extractStatus(r);
                const imageUrl = extractImage(r);

                if (status === "SUCCESS" || status === "READY" || status === "SUCCEEDED") {
                    if (!imageUrl) throw new Error("flux finished but no image url found in response");
                    const src = await urlToDataUrl(imageUrl);
                    return saveImg(db, src, prompt, {
                        model,
                        modelLabel: "Flux 2 Max",
                        provider: "flux",
                        size: `${fluxWidth}x${fluxHeight}`
                    });
                }

                if (status === "FAILED" || status === "ERROR" || status === "CANCELED") {
                    throw new Error(r?.data?.fail_reason || "flux generation failed");
                }

                /* edge case: status hasn't updated yet but image url already exists */
                if (imageUrl && r?.data?.progress === "100%") {
                    const src = await urlToDataUrl(imageUrl);
                    return saveImg(db, src, prompt, {
                        model,
                        modelLabel: "Flux 2 Max",
                        provider: "flux",
                        size: `${fluxWidth}x${fluxHeight}`
                    });
                }

            } catch (e) {
                if (e.name === "AbortError") throw e;
                if (attempts > 10) throw e;
            }
        }

        throw new Error("timed out waiting for flux after ~4.5 min");
    };

    /* ── Provider: Stable Diffusion ── */
    const genSD = async (db, { apiKey, model, prompt, negativePrompt, sdSize, sdSteps, sdGuidance, sdSeed, sdInputImage, sdPromptStrength, signal }) => {
        
        const actualSeed = (sdSeed !== "" && !isNaN(parseInt(sdSeed))) 
            ? parseInt(sdSeed) 
            : Math.floor(Math.random() * 2147483647);

        const input = { prompt, seed: actualSeed };

        if (sdInputImage) {
            input.image = sdInputImage.dataUrl;
            input.prompt_strength = sdPromptStrength;
        } else {
            input.aspect_ratio = sdSize || "1:1";
        }

        if (negativePrompt?.trim()) input.negative_prompt = negativePrompt.trim();
        if (sdSteps != null) input.num_inference_steps = parseInt(sdSteps);
        if (sdGuidance != null) input.guidance_scale = parseFloat(sdGuidance);

        /* ── Step 1: create prediction ── */
        const createRes = await fetch(`https://api.cometapi.com/replicate/v1/models/${model}/predictions`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`,
                "Prefer": "wait=55"
            },
            body: JSON.stringify({ input }),
            signal
        });

        console.log("[SD] Create status:", createRes.status, createRes.statusText);
        const createText = await createRes.text();
        console.log("[SD] Create body:", createText);

        if (!createRes.ok) throw new Error(`${createRes.status}: ${createText}`);

        let prediction;
        try { prediction = JSON.parse(createText); }
        catch { throw new Error("non-JSON response: " + createText.slice(0, 300)); }

        /* ── Step 2: poll if not already done ── */
        const pollUrl = prediction?.urls?.get;
        let output = prediction?.output;

        if (!output && pollUrl) {
            for (let i = 0; i < 60; i++) {
                if (signal?.aborted) throw new DOMException("Aborted", "AbortError");
                await new Promise(r => setTimeout(r, 3000));

                const pollRes = await fetch(pollUrl, {
                    headers: { "Authorization": `Bearer ${apiKey}` },
                    signal
                });
                const pollData = await pollRes.json();
                console.log("[SD] Poll status:", pollData.status);

                if (pollData.status === "succeeded") { output = pollData.output; break; }
                if (pollData.status === "failed")    throw new Error("SD generation failed: " + pollData.error);
            }
        }

        const outputUrl = Array.isArray(output) ? output[0] : output;
        if (!outputUrl) throw new Error("no image returned from stable diffusion");

        const src = await urlToDataUrl(outputUrl);
        if (!src) throw new Error("failed to retrieve generated image");

        return saveImg(db, src, prompt, {
            model,
            modelLabel: MODEL_MAP[model]?.label,
            provider:   "sd",
            size:       sdSize,
            negativePrompt: negativePrompt?.trim() || null,
            steps:      sdSteps,
            guidance:   sdGuidance,
            seed:       actualSeed,
            promptStrength: sdInputImage ? sdPromptStrength : null,
        });
    };

                        <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                            <button onClick={exportVault} className="btn-ghost" style={{ height: 34 }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 4 }}>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                backup
                            </button>
                            <label className="btn-ghost" style={{ height: 34, cursor: "pointer", display: "inline-flex", alignItems: "center", fontWeight: 600 }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 4 }}>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                restore
                                <input type="file" accept=".json" onChange={importVault} style={{ display: "none" }} />
                            </label>
                        </div>

                        {selectedIds.length > 0 && (
                            <div className="btn-row" style={{ width: "100%" }}>
                                <button className="download-btn" onClick={downloadBulk}>
                                    download {selectedIds.length}
                                </button>
                                <button className="btn btn-danger" onClick={deleteBulk}>
                                    delete {selectedIds.length}
                                </button>
                                <button className="btn btn-ghost" style={{ height: 34 }} onClick={() => setSelectedIds([])}>cancel</button>
                            </div>
                        )}
                    </div>

                    {history.length === 0 ? (
                        <div className="empty">
                            <div className="empty-icon">✦</div>
                            <p>nothing here yet</p>
                            <span>generate something and it'll show up here</span>
                        </div>
                    ) : (
                        <div className="gallery">
                            {history.map(img => (
                                <div
                                    key={img.id}
                                    className={`img-card${selectedIds.includes(img.id) ? " selected" : ""}${removingIds.includes(img.id) ? " removing" : ""}`}
                                    onClick={() => openDrawer(img)}
                                >
                                    <img src={img.src} loading="lazy" draggable="false" />
                                    <div className="card-overlay">
                                        <div className="card-top">
                                            <div className="check" onClick={e => { e.stopPropagation(); toggleSelect(img.id, e); }}>
                                                {selectedIds.includes(img.id) && (
                                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5">
                                                        <polyline points="20 6 9 17 4 12"/>
                                                    </svg>
                                                )}
                                            </div>
                                            <button className="del-btn" onClick={e => deleteOne(img.id, e)}>delete</button>
                                        </div>
                                        {img.prompt && <div className="prompt-fade"><p>{img.prompt}</p></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </main>

                {/* ── Drawer ── */}
                {viewImage && (
                    <div className="drawer-overlay" onClick={() => setViewImage(null)}>
                        <div className="drawer" onClick={e => e.stopPropagation()}>
                            <div className="drawer-head">
                                <div className="drawer-tabs">
                                    <button className={`drawer-tab${drawerTab === "preview" ? " active" : ""}`} onClick={() => setDrawerTab("preview")}>preview</button>
                                    <button className={`drawer-tab${drawerTab === "info" ? " active" : ""}`} onClick={() => setDrawerTab("info")}>info</button>
                                </div>
                                <button className="drawer-close" onClick={() => setViewImage(null)}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                                    </svg>
                                </button>
                            </div>

                            <div className="drawer-body">
                                {drawerTab === "preview" ? (
                                    <div className="drawer-preview">
                                        <img src={viewImage.src} draggable="false" style={{ cursor: "zoom-in" }} onClick={() => setLightboxSrc(viewImage.src)} />
                                    </div>
                                ) : (
                                    <div className="drawer-info">
                                        <button className="btn btn-ghost" style={{ width: "100%", justifyContent: "center" }} onClick={() => openReuseModal(viewImage)}>
                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/>
                                            </svg>
                                            reuse settings
                                        </button>

                                        <div className="info-block">
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                <div className="info-label">prompt</div>
                                                {viewImage.prompt && (
                                                    <button className="info-copy-btn" onClick={e => copyPrompt(viewImage.prompt, e)}>copy</button>
                                                )}
                                            </div>
                                            <div className="info-prompt-box">{viewImage.prompt || "no prompt saved"}</div>
                                        </div>

                                        {(viewImage.provider === "bria" || viewImage.provider === "sd") && viewImage.negativePrompt && (
                                            <div className="info-block">
                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                    <div className="info-label">negative prompt</div>
                                                    <button className="info-copy-btn" onClick={e => copyPrompt(viewImage.negativePrompt, e)}>copy</button>
                                                </div>
                                                <div className="info-prompt-box">{viewImage.negativePrompt}</div>
                                            </div>
                                        )}

                                        <div className="info-grid">
                                            <div className="info-block">
                                                <div className="info-label">model</div>
                                                <div className="info-value">{viewImage.modelLabel || "—"}</div>
                                            </div>
                                            <div className="info-block">
                                                <div className="info-label">created</div>
                                                <div className="info-value">{viewImage.timestamp || "—"}</div>
                                            </div>
                                            {viewImage.ratio && (
                                                <div className="info-block">
                                                    <div className="info-label">ratio</div>
                                                    <div className="info-value">{viewImage.ratio}</div>
                                                </div>
                                            )}
                                            {viewImage.provider === "sd" && viewImage.size && !viewImage.promptStrength && (
                                                <div className="info-block">
                                                    <div className="info-label">resolution</div>
                                                    <div className="info-value">{
                                                        ({ "1024x1024": "1:1", "1024x768": "4:3", "768x1024": "3:4", "1024x576": "16:9", "576x1024": "9:16" })[viewImage.size] || viewImage.size
                                                    }</div>
                                                </div>
                                            )}
                                            {viewImage.provider !== "sd" && viewImage.size && (
                                                <div className="info-block">
                                                    <div className="info-label">resolution</div>
                                                    <div className="info-value">{viewImage.size}</div>
                                                </div>
                                            )}
                                            {(viewImage.provider === "bria" || viewImage.provider === "sd") && viewImage.seed && (
                                                <div className="info-block">
                                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                        <div className="info-label">seed</div>
                                                        <button className="info-copy-btn" onClick={e => copyPrompt(String(viewImage.seed), e)}>copy</button>
                                                    </div>
                                                    <div className="info-value" style={{ userSelect: "text", WebkitUserSelect: "text" }}>{viewImage.seed}</div>
                                                </div>
                                            )}
                                            {(viewImage.provider === "bria" || viewImage.provider === "sd") && viewImage.steps && (
                                                <div className="info-block">
                                                    <div className="info-label">steps</div>
                                                    <div className="info-value">{viewImage.steps}</div>
                                                </div>
                                            )}
                                            {(viewImage.provider === "bria" || viewImage.provider === "sd") && viewImage.guidance && (
                                                <div className="info-block">
                                                    <div className="info-label">guidance</div>
                                                    <div className="info-value">{viewImage.guidance}</div>
                                                </div>
                                            )}

                                            {viewImage.provider === "sd" && viewImage.promptStrength != null && (
                                                <div className="info-block">
                                                    <div className="info-label">strength</div>
                                                    <div className="info-value">{viewImage.promptStrength}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="drawer-foot">
                                <button className="btn btn-dl" onClick={e => downloadImg(viewImage, e)}>download</button>
                                <button className="btn btn-del-outline" onClick={() => deleteOne(viewImage.id)}>delete</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── Reuse modal ── */}
                {reuseModal && (
                    <div className="reuse-modal-overlay" onClick={() => setReuseModal(null)}>
                        <div className="reuse-modal" onClick={e => e.stopPropagation()}>
                            <div>
                                <div className="reuse-modal-title">reuse settings</div>
                                <div className="reuse-modal-sub">pick what you want to bring back</div>
                            </div>
                            <div className="reuse-options">
                                {Object.entries(reuseChecked).map(([key, checked]) => {
                                    const labels = {
                                        model: "model",
                                        prompt: "prompt",
                                        ratio: "ratio",
                                        size: "size / resolution",
                                        negativePrompt: "negative prompt",
                                        steps: "steps",
                                        guidance: "guidance",
                                        seed: "seed"
                                    };
                                    const values = {
                                        model: reuseModal.modelLabel,
                                        prompt: reuseModal.prompt,
                                        ratio: reuseModal.ratio,
                                        size: reuseModal.size,
                                        negativePrompt: reuseModal.negativePrompt,
                                        steps: reuseModal.steps,
                                        guidance: reuseModal.guidance,
                                        seed: reuseModal.seed
                                    };
                                    return (
                                        <label key={key} className="reuse-option">
                                            <input type="checkbox" checked={checked}
                                                onChange={e => setReuseChecked(prev => ({ ...prev, [key]: e.target.checked }))} />
                                            <div>
                                                <div className="reuse-option-label">{labels[key]}</div>
                                                <div className="reuse-option-value">{String(values[key] || "")}</div>
                                            </div>
                                        </label>
                                    );
                                })}
                            </div>
                            <div className="btn-row">
                                <button className="btn btn-ghost" style={{ flex: 1, height: 40 }} onClick={() => setReuseModal(null)}>cancel</button>
                                <button className="btn btn-primary" style={{ flex: 1, height: 40 }} onClick={applyReuse}>apply</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── Lightbox ── */}
                {lightboxSrc && (
                    <div className="lightbox-overlay" onClick={() => setLightboxSrc(null)}>
                        <img src={lightboxSrc} draggable="false" onClick={e => e.stopPropagation()} />
                    </div>
                )}

                {/* ── Confirm modal ── */}
                {confirm && (
                    <Confirm title={confirm.title} body={confirm.body} confirmLabel={confirm.confirmLabel}
                        onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />
                )}

                {/* ── Mobile tab bar ── */}
                <nav className="tab-bar">
                    <button className={`tab-btn${mobileTab === "settings" ? " active" : ""}`} onClick={() => setMobileTab("settings")}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 21, height: 21 }}>
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                        settings
                    </button>
                    <button className={`tab-btn${mobileTab === "gallery" ? " active" : ""}`} onClick={() => setMobileTab("gallery")}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 21, height: 21 }}>
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        gallery
                        {history.length > 0 && <span style={{ fontSize: 10, color: "var(--text3)", marginTop: -2 }}>{history.length}</span>}
                    </button>
                </nav>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
