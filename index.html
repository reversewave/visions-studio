<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Visions Studio</title>
    <link rel="icon" type="image/png" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-8mc6a2uk.png">
    <link rel="apple-touch-icon" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-8mc6a2uk.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Visions">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#08080e">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Variables ── */
        :root {
            --bg:           #08080e;
            --surface:      #0c0c15;
            --surf2:        #111120;
            --surf3:        #19192c;
            --surf4:        #23233a;
            --border:       rgba(255,255,255,0.05);
            --border2:      rgba(255,255,255,0.08);
            --border3:      rgba(255,255,255,0.13);
            --purple:       #8b5cf6;
            --purple-hover: #7c4ef0;
            --purple-dim:   rgba(139,92,246,0.10);
            --purple-ring:  rgba(139,92,246,0.18);
            --pink:         #e84393;
            --pink-dim:     rgba(232,67,147,0.08);
            --pink-border:  rgba(232,67,147,0.18);
            --accent:       #ef4468;
            --text:         #e4e4f0;
            --text2:        #8585a0;
            --text3:        #4a4a62;
            --r:            6px;
            --r-sm:         4px;
            --r-lg:         8px;
            --ease:         cubic-bezier(0.22,1,0.36,1);
            --ease2:        cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Reset ── */
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Figtree', sans-serif;
            font-size: 14px;
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

        .app { display: flex; height: 100vh; width: 100vw; }

        /* ── Sidebar ── */
        .sidebar {
            width: 272px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 10;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sidebar-foot {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--surface);
        }

        .wordmark {
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            background: linear-gradient(105deg, var(--purple) 20%, var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Fields ── */
        .field { display: flex; flex-direction: column; gap: 6px; }

        .label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.05em;
            text-transform: lowercase;
        }

        /* ── Inputs ── */
        .inp {
            background: var(--surf2);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            color: var(--text);
            font-family: 'Figtree', sans-serif;
            font-size: 13px;
            padding: 0 12px;
            height: 38px;
            width: 100%;
            transition: border-color 0.15s var(--ease2), background 0.15s var(--ease2), box-shadow 0.15s var(--ease2);
            appearance: none;
            -webkit-appearance: none;
        }

        .inp:focus {
            outline: none;
            border-color: rgba(139,92,246,0.45);
            background: var(--surf3);
            box-shadow: 0 0 0 3px var(--purple-ring);
        }

        .inp::placeholder { color: var(--text3); }
        select.inp { cursor: pointer; }

        textarea.inp {
            height: 110px;
            padding: 10px 12px;
            resize: none;
            line-height: 1.55;
        }

        .inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* ── Notices ── */
        .flash-warn {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(234,179,8,0.05);
            border: 1px solid rgba(234,179,8,0.12);
            border-radius: var(--r);
            font-size: 12px;
            color: rgba(234,179,8,0.8);
            line-height: 1.45;
        }

        .flash-warn svg { flex-shrink: 0; margin-top: 1px; }

        /* ── Buttons ── */
        .btn {
            border: none;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            font-size: 13px;
            transition: all 0.15s var(--ease2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active:not(:disabled) { transform: scale(0.97); }

        .btn-primary {
            background: var(--purple);
            color: #fff;
            height: 40px;
            width: 100%;
            letter-spacing: 0.01em;
        }

        .btn-primary:hover:not(:disabled) { background: var(--purple-hover); }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop {
            background: var(--accent);
            color: #fff;
            height: 40px;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .btn-stop:hover { opacity: 0.85; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border2);
            padding: 0 12px;
            height: 34px;
            font-size: 12.5px;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            cursor: pointer;
            transition: all 0.15s var(--ease2);
            gap: 6px;
        }

        .btn-ghost:hover {
            background: var(--surf2);
            color: var(--text);
            border-color: var(--border3);
        }

        .btn-ghost:active { transform: scale(0.97); }

        .btn-danger {
            background: var(--accent);
            color: #fff;
            padding: 0 14px;
            height: 34px;
            font-size: 12.5px;
        }

        .btn-danger:hover { opacity: 0.85; }

        .btn-row { display: flex; gap: 8px; }
        .btn-row .btn-primary { flex: 1; }

        .download-btn {
            background: var(--purple-dim);
            color: var(--purple);
            padding: 0 14px;
            height: 34px;
            font-size: 12.5px;
            border: 1px solid rgba(139,92,246,0.18);
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            font-weight: 600;
            border-radius: var(--r);
            transition: all 0.15s var(--ease2);
        }

        .download-btn:hover { background: rgba(139,92,246,0.18); color: #fff; }

        /* ── Errors ── */
        .error-box {
            display: flex;
            gap: 10px;
            padding: 11px 13px;
            border-radius: var(--r);
            align-items: flex-start;
        }

        .error-box svg { flex-shrink: 0; margin-top: 1px; }

        .error-api {
            background: var(--purple-dim);
            border: 1px solid rgba(139,92,246,0.18);
        }

        .error-api .error-title { color: var(--purple); }
        .error-api .error-detail { color: rgba(160,130,240,0.75); }

        .error-app {
            background: var(--pink-dim);
            border: 1px solid var(--pink-border);
        }

        .error-app .error-title { color: var(--pink); }
        .error-app .error-detail { color: rgba(232,67,147,0.7); }

        .error-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .error-detail {
            font-size: 12px;
            line-height: 1.4;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 28px 30px;
            height: 100vh;
            background: var(--bg);
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .page-title {
            font-family: 'Sora', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        .page-sub {
            font-size: 12.5px;
            color: var(--text3);
            margin-top: 3px;
        }

        /* ── Gallery ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            touch-action: auto;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .img-card {
            position: relative;
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--surf2);
            transition: border-color 0.2s var(--ease2), box-shadow 0.2s var(--ease2), transform 0.2s var(--ease);
            animation: cardIn 0.25s var(--ease) both;
        }

        .img-card:hover {
            border-color: rgba(139,92,246,0.25);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }

        .img-card.selected {
            border-color: var(--purple);
            box-shadow: 0 0 0 1px var(--purple);
        }

        .img-card.selected:hover {
            box-shadow: 0 0 0 1px var(--purple), 0 6px 24px rgba(0,0,0,0.3);
        }

        .img-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s var(--ease2);
        }

        .img-card:hover .card-overlay,
        .img-card.selected .card-overlay { opacity: 1; }

        .card-top {
            position: absolute;
            top: 8px; left: 8px; right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .check {
            width: 22px;
            height: 22px;
            border-radius: var(--r-sm);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s var(--ease2);
        }

        .check:active { transform: scale(0.88); }

        .img-card.selected .check {
            background: var(--purple);
            border-color: var(--purple);
        }

        .del-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.75);
            border-radius: var(--r-sm);
            padding: 4px 9px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .del-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .prompt-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 36px 10px 10px;
            background: linear-gradient(transparent, rgba(8,8,14,0.92));
            pointer-events: none;
        }

        .prompt-fade p {
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Empty ── */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 100px 24px;
            text-align: center;
        }

        .empty-icon {
            width: 44px; height: 44px;
            border-radius: var(--r);
            background: var(--surf2);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 6px;
            color: var(--text3);
        }

        .empty p { font-size: 14px; font-weight: 600; color: var(--text2); }
        .empty span { font-size: 13px; color: var(--text3); }

        /* ── Drawer ── */
        @keyframes drawerOverlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes drawerSlideIn {
            from { transform: translateX(100%); }
            to   { transform: translateX(0); }
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(4,4,8,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: flex-end;
            animation: drawerOverlayIn 0.15s ease both;
        }

        .drawer {
            width: 500px;
            max-width: 100%;
            height: 100%;
            background: var(--surface);
            border-left: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            animation: drawerSlideIn 0.28s var(--ease) both;
            box-shadow: -12px 0 40px rgba(0,0,0,0.35);
        }

        .drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .drawer-tabs {
            display: flex;
            height: 100%;
            gap: 0;
        }

        .drawer-tab {
            height: 100%;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Figtree', sans-serif;
            color: var(--text3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.15s var(--ease2), border-color 0.15s var(--ease2);
        }

        .drawer-tab:hover { color: var(--text2); }

        .drawer-tab.active {
            color: var(--text);
            border-bottom-color: var(--purple);
        }

        .drawer-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            color: var(--text3);
            cursor: pointer;
            transition: all 0.15s var(--ease2);
        }

        .drawer-close:hover { color: var(--text); background: var(--surf2); }

        .drawer-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .drawer-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            background: var(--bg);
        }

        .drawer-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: var(--r-sm);
        }

        .drawer-info {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .info-thumb {
            width: 100%;
            height: 160px;
            border-radius: var(--r);
            overflow: hidden;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            font-size: 10.5px;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.05em;
            color: var(--text3);
        }

        .info-value {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.5;
        }

        .info-prompt-box {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r);
            max-height: 140px;
            overflow-y: auto;
            user-select: text;
            -webkit-user-select: text;
        }

        .info-copy-btn {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple);
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            padding: 0;
            transition: opacity 0.15s;
        }

        .info-copy-btn:hover { opacity: 0.65; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .drawer-foot {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: var(--surface);
        }

        .drawer-foot .btn { flex: 1; height: 38px; }

        .btn-dl {
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .btn-dl:hover { background: var(--purple-hover); }
        .btn-dl:active { transform: scale(0.97); }

        .btn-del-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(239,68,104,0.2);
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Figtree', sans-serif;
            transition: all 0.15s var(--ease2);
        }

        .btn-del-outline:hover { background: rgba(239,68,104,0.08); }
        .btn-del-outline:active { transform: scale(0.97); }

        /* ── Confirm modal ── */
        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: overlayIn 0.15s ease both;
        }

        .modal {
            background: var(--surf2);
            border: 1px solid var(--border2);
            border-radius: var(--r-lg);
            padding: 24px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: modalIn 0.2s var(--ease) both;
        }

        .modal-title {
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .modal-body {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

        /* ── Pulse ── */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .pulse-text { animation: pulse 2s ease-in-out infinite; }
        .faded { opacity: 0.25; pointer-events: none; }

        /* ── Lightbox ── */
        @keyframes lightboxIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lightboxIn 0.15s ease both;
            cursor: zoom-out;
        }

        .lightbox-overlay img {
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            object-fit: contain;
            border-radius: var(--r);
            cursor: default;
        }

        /* ── Reference images ── */
        .ref-drop {
            border: 1.5px dashed var(--border3);
            border-radius: var(--r);
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s var(--ease2);
            text-align: center;
        }

        .ref-drop:hover {
            border-color: rgba(139,92,246,0.35);
            background: rgba(139,92,246,0.04);
        }

        .ref-drop-label {
            font-size: 12px;
            color: var(--text3);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .ref-thumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .ref-thumb {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: var(--r-sm);
            overflow: hidden;
            border: 1px solid var(--border2);
            flex-shrink: 0;
            transition: transform 0.2s var(--ease);
        }

        .ref-thumb:hover { transform: scale(1.06); }
        .ref-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .ref-thumb-rm {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s var(--ease2);
            cursor: pointer;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            width: 100%;
        }

        .ref-thumb:hover .ref-thumb-rm { opacity: 1; }

        /* ── Tab bar ── */
        .tab-bar { display: none; }

        /* ── Dim hint ── */
        .dim-hint {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            body { overflow: hidden; }
            .app { flex-direction: column; height: 100dvh; }

            .sidebar {
                width: 100%;
                height: calc(100dvh - 56px);
                border-right: none;
                display: none;
            }

            .sidebar.tab-active { display: flex; }

            .main {
                height: calc(100dvh - 56px);
                padding: 18px 14px;
                display: none;
            }

            .main.tab-active { display: block; }

            .sidebar-body { padding: 18px 14px; gap: 16px; }
            .sidebar-foot { padding: 12px 14px; }
            .card-overlay { opacity: 1; }
            .prompt-fade { display: none; }
            .gallery { grid-template-columns: 1fr 1fr; gap: 8px; }
            .main-header { margin-bottom: 16px; }

            .drawer { width: 100%; border-left: none; }

            .tab-bar {
                display: flex;
                height: 56px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
                padding-bottom: env(safe-area-inset-bottom);
            }

            .tab-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                border: none;
                background: transparent;
                color: var(--text3);
                font-family: 'Figtree', sans-serif;
                font-size: 10.5px;
                font-weight: 600;
                cursor: pointer;
                transition: color 0.15s var(--ease2);
                letter-spacing: 0.02em;
            }

            .tab-btn.active { color: var(--purple); }

            .check { width: 26px; height: 26px; }
            .del-btn { padding: 5px 10px; font-size: 11px; }
            .ref-thumb-rm { opacity: 1; background: rgba(0,0,0,0.5); }
            .img-card:hover { border-color: var(--border); box-shadow: none; transform: none; }
            .info-thumb { height: 140px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Model registry ── */
    const MODELS = [
        { id: "gemini-3-pro-image",             label: "Gemini 3 Pro Image",  group: "Gemini",     provider: "gemini" },
        { id: "gemini-3.1-flash-image-preview", label: "Gemini 3.1 Flash",    group: "Gemini",     provider: "gemini" },
        { id: "dall-e-3",                       label: "DALL-E 3",            group: "OpenAI",     provider: "openai" },
        { id: "gpt-image-1.5",                  label: "GPT Image 1.5",       group: "OpenAI",     provider: "openai" },
        { id: "midjourney",                     label: "Midjourney",           group: "Midjourney", provider: "midjourney" },
        { id: "bria/image-3.2",                 label: "Bria 3.2",            group: "Bria",       provider: "bria" },
        { id: "flux-2-max",                     label: "Flux 2 Max",          group: "Flux",       provider: "flux" },
    ];

    const MODEL_MAP = Object.fromEntries(MODELS.map(m => [m.id, m]));

    const OPENAI_SIZES = {
        "dall-e-3":         ["1024x1024", "1792x1024", "1024x1792"],
        "gpt-image-1.5":    ["1024x1024", "1536x1024", "1024x1536"],
    };

    const BRIA_RATIOS = ["1:1", "2:3", "3:2", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9"];

    const GEMINI_PRO_RATIOS  = ["1:1", "3:2", "2:3", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9", "21:9"];
    const GEMINI_FLASH_RATIOS = [...GEMINI_PRO_RATIOS, "1:4", "4:1", "1:8", "8:1"];

    const MODEL_GROUPS = MODELS.reduce((acc, m) => {
        if (!acc[m.group]) acc[m.group] = [];
        acc[m.group].push(m);
        return acc;
    }, {});

    /* ── Flux dimension helpers ── */
    const snapTo16 = v => Math.round(v / 16) * 16;
    const clampFluxDim = v => {
        let n = parseInt(v) || 1024;
        n = snapTo16(n);
        return Math.max(64, Math.min(2048, n));
    };

    /* ── DB & utilities ── */
    const DB_NAME = "VisionsStudio_Final_Gold_V12_Clean";
    const STORE = "images";

    const initDB = () => new Promise(resolve => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            if (!e.target.result.objectStoreNames.contains(STORE))
                e.target.result.createObjectStore(STORE, { keyPath: "id" });
        };
        req.onsuccess = e => resolve(e.target.result);
    });

    const parseError = (raw, type = "api") => {
        const s = String(raw || "");
        if (type === "app") {
            if (s.includes("KEY & PROMPT")) return { type: "app", title: "hold on", detail: "you need an api key and a prompt before anything happens" };
            return { type: "app", title: "oops", detail: s || "something went wrong on our end" };
        }
        if (s.includes("401")) return { type: "api", title: "bad key", detail: "that key got rejected. double check it's correct and still active" };
        if (s.includes("429")) return { type: "api", title: "slow down", detail: "hit a rate limit. wait a sec and try again" };
        if (s.includes("403")) return { type: "api", title: "no access", detail: "your key might not have permission for this model" };
        if (s.includes("500")) return { type: "api", title: "server error", detail: "something broke on the api side. not you, try again" };
        return { type: "api", title: "something broke", detail: s || "no details available" };
    };

    const urlToDataUrl = async url => {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.readAsDataURL(blob);
            });
        } catch {
            return url;
        }
    };

    const poll = (fn, check, ms = 4000, signal, maxAttempts = 70) => new Promise((resolve, reject) => {
        let attempts = 0;
        const run = async () => {
            if (signal?.aborted) return reject(new DOMException("Aborted", "AbortError"));
            if (attempts >= maxAttempts) return reject(new Error("timed out waiting. the model might be busy, try again"));
            attempts++;
            try {
                const result = await fn();
                if (check(result)) return resolve(result);
                setTimeout(run, ms);
            } catch (e) { reject(e); }
        };
        run();
    });

    const saveImg = (db, src, prompt, meta = {}) => {
        const img = {
            id: Date.now() + Math.random(),
            src,
            prompt,
            timestamp: new Date().toLocaleString(),
            model: meta.model || null,
            modelLabel: meta.modelLabel || null,
            provider: meta.provider || null,
            ratio: meta.ratio || null,
            size: meta.size || null,
        };
        db.transaction(STORE, "readwrite").objectStore(STORE).add(img);
        return img;
    };

    /* ── Provider: Gemini ── */
    const genGemini = async (db, { apiKey, model, prompt, ratio, size, refImages, signal }) => {
        const isFlash = model.includes('flash');
        const imageParts = refImages.map(r => ({ inlineData: { mimeType: r.mediaType, data: r.base64 } }));
        const imageConfig = isFlash ? { aspectRatio: ratio } : { aspectRatio: ratio, imageSize: size };
        const body = {
            contents: [{ role: "user", parts: [...imageParts, { text: prompt }] }],
            generationConfig: {
                responseModalities: ["TEXT", "IMAGE"],
                imageConfig
            }
        };
        const res = await fetch(`https://api.cometapi.com/v1beta/models/${model}:generateContent`, {
            method: "POST", mode: "cors",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify(body), signal
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(d.error?.message || `API ERROR: ${res.status}`);
        }
        const data = await res.json();
        const b64 = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (!b64) {
            const txt = data?.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
            throw new Error(txt ? `model returned text instead of image: "${txt.slice(0, 120)}"` : "model returned no image, try a different prompt");
        }
        return saveImg(db, `data:image/png;base64,${b64}`, prompt, {
            model, modelLabel: MODEL_MAP[model]?.label, provider: "gemini",
            ratio, size: isFlash ? null : size
        });
    };

    /* ── Provider: OpenAI ── */
    const genOpenAI = async (db, { apiKey, model, prompt, openaiSize, signal }) => {
        const body = { model, prompt, n: 1, response_format: "b64_json" };
        if (openaiSize) body.size = openaiSize;
        const res = await fetch("https://api.cometapi.com/v1/images/generations", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify(body), signal
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(d.error?.message || `API ERROR: ${res.status}`);
        }
        const data = await res.json();
        const item = data?.data?.[0];
        if (!item) return null;
        let src;
        if (item.b64_json) src = `data:image/png;base64,${item.b64_json}`;
        else if (item.url) src = await urlToDataUrl(item.url);
        return src ? saveImg(db, src, prompt, {
            model, modelLabel: MODEL_MAP[model]?.label, provider: "openai", size: openaiSize
        }) : null;
    };

    /* ── Provider: Midjourney ── */
    const genMidjourney = async (db, { apiKey, prompt, batchSize, signal, setStatusMsg }) => {
        setStatusMsg("submitting to mj...");
        const submitRes = await fetch("https://api.cometapi.com/mj/submit/imagine", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify({ botType: "MID_JOURNEY", prompt, accountFilter: { modes: ["FAST"] } }),
            signal
        });
        if (!submitRes.ok) throw new Error(`API ERROR: ${submitRes.status}`);
        const submitData = await submitRes.json();
        const taskId = submitData.result;
        if (!taskId) throw new Error("midjourney returned no task id");

        const fetchTask = async id => {
            const r = await fetch(`https://api.cometapi.com/mj/task/${id}/fetch`, {
                headers: { "Authorization": `Bearer ${apiKey}` }, signal
            });
            return r.json();
        };

        setStatusMsg("mj is creating...");
        const gridResult = await poll(
            () => fetchTask(taskId),
            r => r.status === "SUCCESS" || r.status === "FAILURE",
            5000, signal, 70
        );
        if (gridResult.status === "FAILURE") throw new Error("midjourney generation failed");

        const upscaleButtons = (gridResult.buttons || [])
            .filter(b => /^U[1-4]$/.test(b.label))
            .slice(0, batchSize);

        if (!upscaleButtons.length) {
            const src = await urlToDataUrl(gridResult.imageUrl);
            return [saveImg(db, src, prompt, { model: "midjourney", modelLabel: "Midjourney", provider: "midjourney" })];
        }

        const results = [];
        for (let i = 0; i < upscaleButtons.length; i++) {
            if (signal?.aborted) break;
            const btn = upscaleButtons[i];
            setStatusMsg(`upscaling ${i + 1} of ${upscaleButtons.length}...`);
            const actionRes = await fetch("https://api.cometapi.com/mj/submit/action", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ taskId, customId: btn.customId }),
                signal
            });
            if (!actionRes.ok) continue;
            const actionData = await actionRes.json();
            const upscaleId = actionData.result;
            if (!upscaleId) continue;
            const upscaleResult = await poll(
                () => fetchTask(upscaleId),
                r => r.status === "SUCCESS" || r.status === "FAILURE",
                4000, signal, 60
            );
            if (upscaleResult.status === "SUCCESS" && upscaleResult.imageUrl) {
                const src = await urlToDataUrl(upscaleResult.imageUrl);
                results.push(saveImg(db, src, prompt, { model: "midjourney", modelLabel: "Midjourney", provider: "midjourney" }));
            }
        }
        return results;
    };

    /* ── Provider: Bria ── */
    const genBria = async (db, { apiKey, prompt, negativePrompt, ratio, batchSize, signal }) => {
        const body = { prompt, num_results: batchSize, aspect_ratio: ratio };
        if (negativePrompt && negativePrompt.trim()) body.negative_prompt = negativePrompt.trim();
        const res = await fetch("https://api.cometapi.com/bria/text-to-image", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify(body), signal
        });
        if (!res.ok) throw new Error(`API ERROR: ${res.status}`);
        const data = await res.json();
        const results = [];
        for (const item of (data?.result || [])) {
            for (const url of (item.urls || [])) {
                const src = await urlToDataUrl(url);
                results.push(saveImg(db, src, prompt, { model: "bria/image-3.2", modelLabel: "Bria 3.2", provider: "bria", ratio }));
            }
        }
        return results;
    };

    /* ── Provider: Flux ── */
    const genFlux = async (db, { apiKey, model, prompt, fluxWidth, fluxHeight, signal, setStatusMsg }) => {
        const width = clampFluxDim(fluxWidth);
        const height = clampFluxDim(fluxHeight);
        setStatusMsg("submitting to flux...");
        const submitRes = await fetch(`https://api.cometapi.com/flux/v1/${model}`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
            body: JSON.stringify({ prompt, width, height, output_format: "png" }),
            signal
        });
        if (!submitRes.ok) throw new Error(`API ERROR: ${submitRes.status}`);
        const submitData = await submitRes.json();
        const fluxId = submitData.id;
        if (!fluxId) throw new Error("flux returned no task id");

        setStatusMsg("waiting on flux...");
        const resultData = await poll(
            async () => {
                const r = await fetch(`https://api.cometapi.com/flux/v1/get_result?id=${fluxId}`, {
                    headers: { "Authorization": `Bearer ${apiKey}` }, signal
                });
                return r.json();
            },
            r => r.status === "Ready" || r.status === "Error",
            3000, signal, 60
        );
        if (resultData.status === "Error") throw new Error("flux generation failed");
        const imageUrl = resultData?.result?.sample;
        if (!imageUrl) return null;
        const src = await urlToDataUrl(imageUrl);
        return saveImg(db, src, prompt, { model, modelLabel: MODEL_MAP[model]?.label, provider: "flux", size: `${width}×${height}` });
    };

    /* ── Confirm component ── */
    function Confirm({ title, body, confirmLabel, onConfirm, onCancel }) {
        return (
            <div className="overlay" onClick={onCancel}>
                <div className="modal" onClick={e => e.stopPropagation()}>
                    <div className="modal-title">{title}</div>
                    <div className="modal-body">{body}</div>
                    <div className="modal-actions">
                        <button className="btn btn-ghost" onClick={onCancel}>nah</button>
                        <button className="btn btn-danger" onClick={onConfirm}>{confirmLabel}</button>
                    </div>
                </div>
            </div>
        );
    }

    /* ── App ── */
    function App() {
        const [apiKey, setApiKey] = useState(() => localStorage.getItem("vs_key") || "");
        const [history, setHistory] = useState([]);
        const [prompt, setPrompt] = useState("");
        const [model, setModel] = useState("gemini-3-pro-image");
        const [ratio, setRatio] = useState("1:1");
        const [size, setSize] = useState("1K");
        const [openaiSize, setOpenaiSize] = useState("1024x1024");
        const [batchSize, setBatchSize] = useState(1);
        const [loading, setLoading] = useState(false);
        const [statusMsg, setStatusMsg] = useState("");
        const [error, setError] = useState(null);
        const [selectedIds, setSelectedIds] = useState([]);
        const [viewImage, setViewImage] = useState(null);
        const [drawerTab, setDrawerTab] = useState("preview");
        const [confirm, setConfirm] = useState(null);
        const abortRef = useRef(null);
        const [mobileTab, setMobileTab] = useState("gallery");
        const [refImages, setRefImages] = useState([]);
        const fileInputRef = useRef(null);
        const [dragging, setDragging] = useState(false);
        const [lastId, setLastId] = useState(null);
        const [lightboxSrc, setLightboxSrc] = useState(null);
        const [negativePrompt, setNegativePrompt] = useState("");
        const [fluxWidth, setFluxWidth] = useState(1024);
        const [fluxHeight, setFluxHeight] = useState(1024);

        useEffect(() => {
            if (selectedIds.length === 0) setLastId(null);
            else if (!selectedIds.includes(lastId)) setLastId(selectedIds[selectedIds.length - 1]);
        }, [selectedIds, lastId]);

        const provider = MODEL_MAP[model]?.provider || "gemini";

        useEffect(() => {
            if (provider === "openai") setOpenaiSize((OPENAI_SIZES[model] || ["1024x1024"])[0]);
        }, [model]);

        useEffect(() => {
            const load = async () => {
                const db = await initDB();
                const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
                req.onsuccess = () => setHistory(req.result.sort((a, b) => b.id - a.id));
            };
            load();
        }, []);

        useEffect(() => { localStorage.setItem("vs_key", apiKey); }, [apiKey]);

        const openDrawer = (img) => {
            setViewImage(img);
            setDrawerTab("preview");
        };

        const exportVault = async () => {
            const db = await initDB();
            const tx = db.transaction(STORE, "readonly");
            const req = tx.objectStore(STORE).getAll();
            req.onsuccess = () => {
                const blob = new Blob([JSON.stringify(req.result)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `visions-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };
        };

        const importVault = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const db = await initDB();
                    const tx = db.transaction(STORE, "readwrite");
                    data.forEach(item => tx.objectStore(STORE).put(item));
                    tx.oncomplete = () => {
                        alert("vault restored! refreshing...");
                        window.location.reload();
                    };
                } catch {
                    alert("that file isn't a valid visions backup");
                }
            };
            reader.readAsText(file);
        };

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const result = reader.result;
                resolve({ id: Math.random(), base64: result.split(",")[1], mediaType: file.type, preview: result });
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        const handleRefFiles = async e => {
            const files = Array.from(e.target.files || []);
            const converted = await Promise.all(files.map(toBase64));
            setRefImages(prev => [...prev, ...converted]);
            e.target.value = "";
        };

        const removeRef = id => setRefImages(prev => prev.filter(r => r.id !== id));
        const clearRefs = () => setRefImages([]);

        const handleDrop = async e => {
            e.preventDefault();
            setDragging(false);
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
            if (!files.length) return;
            const converted = await Promise.all(files.map(toBase64));
            setRefImages(prev => [...prev, ...converted]);
        };

        const handleFluxDimBlur = (setter) => (e) => {
            setter(clampFluxDim(e.target.value));
        };

        const executeBatch = async () => {
            if (!apiKey || !prompt) return setError(parseError("KEY & PROMPT", "app"));
            const controller = new AbortController();
            abortRef.current = controller;
            setLoading(true);
            setError(null);
            setStatusMsg("generating...");
            const cfg = { apiKey, model, prompt, ratio, size, openaiSize, refImages, batchSize, negativePrompt, fluxWidth, fluxHeight, signal: controller.signal, setStatusMsg };
            try {
                const db = await initDB();
                const imgs = [];

                if (provider === "midjourney") {
                    imgs.push(...await genMidjourney(db, cfg));
                } else if (provider === "bria") {
                    imgs.push(...await genBria(db, cfg));
                } else {
                    const names = { gemini: "gemini", openai: "openai", flux: "flux" };
                    for (let i = 0; i < batchSize; i++) {
                        if (controller.signal.aborted) break;
                        const n = names[provider] || "model";
                        const c = batchSize > 1 ? ` ${i + 1}/${batchSize}` : "";
                        setStatusMsg(`${n} is working${c}...`);
                        let img = null;
                        if (provider === "gemini") img = await genGemini(db, cfg);
                        if (provider === "openai") img = await genOpenAI(db, cfg);
                        if (provider === "flux") img = await genFlux(db, cfg);
                        if (img) imgs.push(img);
                    }
                }

                if (imgs.length > 0) {
                    setHistory(prev => [...imgs, ...prev].sort((a, b) => b.id - a.id));
                    setMobileTab("gallery");
                }
            } catch (err) {
                if (err.name !== "AbortError") setError(parseError(err.message, "api"));
            } finally {
                setLoading(false);
                setStatusMsg("");
                abortRef.current = null;
            }
        };

        const cancelBatch = () => {
            if (abortRef.current) { abortRef.current.abort(); abortRef.current = null; }
        };

        const deleteOne = (id, e) => {
            if (e) e.stopPropagation();
            setConfirm({
                title: "delete this?",
                body: "gone forever. can't undo it.",
                confirmLabel: "yeah, delete it",
                onConfirm: async () => {
                    const db = await initDB();
                    db.transaction(STORE, "readwrite").objectStore(STORE).delete(id);
                    setHistory(prev => prev.filter(h => h.id !== id));
                    setSelectedIds(prev => prev.filter(i => i !== id));
                    if (viewImage?.id === id) setViewImage(null);
                    setConfirm(null);
                }
            });
        };

        const downloadBulk = () => {
            history.filter(img => selectedIds.includes(img.id)).forEach((img, i) => {
                setTimeout(() => {
                    const a = document.createElement("a");
                    a.href = img.src;
                    a.download = `vision-${Math.random().toString(36).substring(2, 10)}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, i * 200);
            });
        };

        const deleteBulk = () => {
            setConfirm({
                title: `delete ${selectedIds.length} image${selectedIds.length > 1 ? "s" : ""}?`,
                body: "all of them... gone. no going back.",
                confirmLabel: "delete all",
                onConfirm: async () => {
                    const db = await initDB();
                    const tx = db.transaction(STORE, "readwrite");
                    selectedIds.forEach(id => tx.objectStore(STORE).delete(id));
                    setHistory(prev => prev.filter(h => !selectedIds.includes(h.id)));
                    setSelectedIds([]);
                    setConfirm(null);
                }
            });
        };

        const toggleSelect = (id, e) => {
            if (e) e.stopPropagation();
            setSelectedIds(prev => {
                const has = prev.includes(id);
                if (e?.shiftKey && lastId !== null) {
                    const ci = history.findIndex(img => img.id === id);
                    const li = history.findIndex(img => img.id === lastId);
                    if (ci !== -1 && li !== -1) {
                        const range = history.slice(Math.min(ci, li), Math.max(ci, li) + 1).map(img => img.id);
                        return has ? prev.filter(p => !range.includes(p)) : [...new Set([...prev, ...range])];
                    }
                }
                return has ? prev.filter(i => i !== id) : [...prev, id];
            });
            setLastId(id);
        };

        const downloadImg = (img, e) => {
            if (e) e.stopPropagation();
            const a = document.createElement("a");
            a.href = img.src;
            a.download = `vision-${Math.random().toString(36).substring(2, 10)}.png`;
            a.click();
        };

        const copyPrompt = (text, e) => {
            if (e) e.stopPropagation();
            if (text) navigator.clipboard.writeText(text);
        };

        const isGeminiFlash = model === 'gemini-3.1-flash-image-preview';

        const ErrorIcon = ({ type }) => type === "api" ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 1 }}>
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
        ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 1 }}>
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        );

        return (
            <div className="app">

                {/* ── Sidebar ── */}
                <aside className={`sidebar${mobileTab === "settings" ? " tab-active" : ""}`}>
                    <div className="sidebar-body">
                        <div className="wordmark">Visions Studio</div>

                        <div className="field">
                            <label className="label">api key</label>
                            <input type="password" className="inp" placeholder="sk-... you know the drill"
                                value={apiKey} onChange={e => setApiKey(e.target.value)} />
                        </div>

                        <div className="field">
                            <label className="label">model</label>
                            <select className="inp" value={model} onChange={e => setModel(e.target.value)}>
                                {Object.entries(MODEL_GROUPS).map(([group, models]) => (
                                    <optgroup key={group} label={group}>
                                        {models.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                                    </optgroup>
                                ))}
                            </select>
                        </div>

                        <div className="field">
                            <label className="label">{provider === "midjourney" ? "images to upscale" : "how many"}</label>
                            <select className="inp" value={batchSize} onChange={e => setBatchSize(parseInt(e.target.value))}>
                                {[1, 2, 3, 4].map(n => <option key={n} value={n}>{n} {n === 1 ? "image" : "images"}</option>)}
                            </select>
                        </div>

                        {provider === "gemini" && (
                            <div className="field">
                                <label className="label">dimensions</label>
                                {isGeminiFlash ? (
                                    <select className="inp" value={ratio} onChange={e => setRatio(e.target.value)}>
                                        {GEMINI_FLASH_RATIOS.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                ) : (
                                    <div className="inp-row">
                                        <select className="inp" value={ratio} onChange={e => setRatio(e.target.value)}>
                                            {GEMINI_PRO_RATIOS.map(r => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                        <select className="inp" value={size} onChange={e => setSize(e.target.value)}>
                                            <option value="1K">1K</option>
                                            <option value="2K">2K</option>
                                            <option value="4K">4K</option>
                                        </select>
                                    </div>
                                )}
                            </div>
                        )}

                        {provider === "openai" && (
                            <div className="field">
                                <label className="label">size</label>
                                <select className="inp" value={openaiSize} onChange={e => setOpenaiSize(e.target.value)}>
                                    {(OPENAI_SIZES[model] || ["1024x1024"]).map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        )}

                        {provider === "bria" && (
                            <>
                                <div className="field">
                                    <label className="label">ratio</label>
                                    <select className="inp" value={ratio} onChange={e => setRatio(e.target.value)}>
                                        {BRIA_RATIOS.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                                <div className="field">
                                    <label className="label">negative prompt <span style={{ fontWeight: 400, color: "var(--text3)", textTransform: "none", letterSpacing: 0 }}>optional</span></label>
                                    <textarea className="inp" style={{ height: 72 }} placeholder="things to exclude from the image..."
                                        value={negativePrompt} onChange={e => setNegativePrompt(e.target.value)} />
                                </div>
                            </>
                        )}

                        {provider === "flux" && (
                            <div className="field">
                                <label className="label">dimensions (px)</label>
                                <div className="inp-row">
                                    <input type="number" className="inp" placeholder="width" min="64" max="2048" step="16"
                                        value={fluxWidth} onChange={e => setFluxWidth(e.target.value)} onBlur={handleFluxDimBlur(setFluxWidth)} />
                                    <input type="number" className="inp" placeholder="height" min="64" max="2048" step="16"
                                        value={fluxHeight} onChange={e => setFluxHeight(e.target.value)} onBlur={handleFluxDimBlur(setFluxHeight)} />
                                </div>
                                <div className="dim-hint">must be multiples of 16 · max 2048 · max ~4MP total</div>
                            </div>
                        )}

                        {provider === "midjourney" && (
                            <div className="flash-warn">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                                use --ar in your prompt for ratio. batch count = how many get upscaled
                            </div>
                        )}

                        {provider === "gemini" && (
                            <div className="field">
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <label className="label">references <span style={{ fontWeight: 400, color: "var(--text3)", textTransform: "none", letterSpacing: 0 }}>optional</span></label>
                                    {refImages.length > 1 && (
                                        <button onClick={clearRefs} style={{ background: "none", border: "none", color: "var(--text3)", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Figtree', sans-serif", padding: 0 }}>
                                            clear
                                        </button>
                                    )}
                                </div>
                                <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={handleRefFiles} />
                                <div
                                    className="ref-drop"
                                    style={dragging ? { borderColor: "var(--purple)", background: "rgba(139,92,246,0.05)" } : {}}
                                    onClick={() => fileInputRef.current.click()}
                                    onDragOver={e => { e.preventDefault(); setDragging(true); }}
                                    onDragLeave={() => setDragging(false)}
                                    onDrop={handleDrop}
                                >
                                    <span className="ref-drop-label">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                                        </svg>
                                        {dragging ? "drop to add" : "drop images here or click"}
                                    </span>
                                </div>
                                {refImages.length > 0 && (
                                    <div className="ref-thumbs">
                                        {refImages.map(r => (
                                            <div key={r.id} className="ref-thumb">
                                                <img src={r.preview} />
                                                <button className="ref-thumb-rm" onClick={() => removeRef(r.id)}>✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="field">
                            <label className="label">what are we making?</label>
                            <textarea className="inp" placeholder="describe it however you want..."
                                value={prompt} onChange={e => setPrompt(e.target.value)} />
                        </div>
                    </div>

                    <div className="sidebar-foot">
                        {error && (
                            <div className={`error-box ${error.type === "api" ? "error-api" : "error-app"}`}>
                                <ErrorIcon type={error.type} />
                                <div>
                                    <div className="error-title">{error.title}</div>
                                    <div className="error-detail">{error.detail}</div>
                                </div>
                            </div>
                        )}
                        {loading ? (
                            <div className="btn-row">
                                <button className="btn btn-primary" disabled>
                                    <span className="pulse-text">{statusMsg || "generating..."}</span>
                                </button>
                                <button className="btn btn-stop" onClick={cancelBatch}>stop</button>
                            </div>
                        ) : (
                            <button className="btn btn-primary" onClick={executeBatch}>generate</button>
                        )}
                    </div>
                </aside>

                {/* ── Gallery ── */}
                <main className={`main${mobileTab === "gallery" ? " tab-active" : ""}`}>
                    <div className="main-header">
                        <div>
                            <div className="page-title">gallery</div>
                            <div className="page-sub">{history.length} image{history.length !== 1 ? "s" : ""}</div>
                        </div>

                        <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                            <button onClick={exportVault} className="btn-ghost" style={{ height: 34 }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 4 }}>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                backup
                            </button>
                            <label className="btn-ghost" style={{ height: 34, cursor: "pointer", display: "inline-flex", alignItems: "center", fontWeight: 600 }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 4 }}>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                restore
                                <input type="file" accept=".json" onChange={importVault} style={{ display: "none" }} />
                            </label>
                        </div>

                        {selectedIds.length > 0 && (
                            <div className="btn-row" style={{ width: "100%" }}>
                                <button className="download-btn" onClick={downloadBulk}>
                                    download {selectedIds.length}
                                </button>
                                <button className="btn btn-danger" onClick={deleteBulk}>
                                    delete {selectedIds.length}
                                </button>
                                <button className="btn btn-ghost" style={{ height: 34 }} onClick={() => setSelectedIds([])}>cancel</button>
                            </div>
                        )}
                    </div>

                    {history.length === 0 ? (
                        <div className="empty">
                            <div className="empty-icon">✦</div>
                            <p>nothing here yet</p>
                            <span>generate something and it'll show up here</span>
                        </div>
                    ) : (
                        <div className="gallery">
                            {history.map(img => (
                                <div
                                    key={img.id}
                                    className={`img-card${selectedIds.includes(img.id) ? " selected" : ""}`}
                                    onClick={() => openDrawer(img)}
                                >
                                    <img src={img.src} loading="lazy" draggable="false" />
                                    <div className="card-overlay">
                                        <div className="card-top">
                                            <div className="check" onClick={e => { e.stopPropagation(); toggleSelect(img.id, e); }}>
                                                {selectedIds.includes(img.id) && (
                                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5">
                                                        <polyline points="20 6 9 17 4 12"/>
                                                    </svg>
                                                )}
                                            </div>
                                            <button className="del-btn" onClick={e => deleteOne(img.id, e)}>delete</button>
                                        </div>
                                        {img.prompt && <div className="prompt-fade"><p>{img.prompt}</p></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </main>

                {/* ── Drawer ── */}
                {viewImage && (
                    <div className="drawer-overlay" onClick={() => setViewImage(null)}>
                        <div className="drawer" onClick={e => e.stopPropagation()}>
                            <div className="drawer-head">
                                <div className="drawer-tabs">
                                    <button className={`drawer-tab${drawerTab === "preview" ? " active" : ""}`} onClick={() => setDrawerTab("preview")}>preview</button>
                                    <button className={`drawer-tab${drawerTab === "info" ? " active" : ""}`} onClick={() => setDrawerTab("info")}>info</button>
                                </div>
                                <button className="drawer-close" onClick={() => setViewImage(null)}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                                    </svg>
                                </button>
                            </div>

                            <div className="drawer-body">
                                {drawerTab === "preview" ? (
                                    <div className="drawer-preview">
                                        <img src={viewImage.src} draggable="false" style={{ cursor: "zoom-in" }} onClick={() => setLightboxSrc(viewImage.src)} />
                                    </div>
                                ) : (
                                    <div className="drawer-info">
                                        <div className="info-thumb">
                                            <img src={viewImage.src} draggable="false" />
                                        </div>

                                        <div className="info-block">
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                <div className="info-label">prompt</div>
                                                {viewImage.prompt && (
                                                    <button className="info-copy-btn" onClick={e => copyPrompt(viewImage.prompt, e)}>copy</button>
                                                )}
                                            </div>
                                            <div className="info-prompt-box">{viewImage.prompt || "no prompt saved"}</div>
                                        </div>

                                        <div className="info-grid">
                                            <div className="info-block">
                                                <div className="info-label">model</div>
                                                <div className="info-value">{viewImage.modelLabel || "—"}</div>
                                            </div>
                                            <div className="info-block">
                                                <div className="info-label">created</div>
                                                <div className="info-value">{viewImage.timestamp || "—"}</div>
                                            </div>
                                            {viewImage.ratio && (
                                                <div className="info-block">
                                                    <div className="info-label">ratio</div>
                                                    <div className="info-value">{viewImage.ratio}</div>
                                                </div>
                                            )}
                                            {viewImage.size && (
                                                <div className="info-block">
                                                    <div className="info-label">resolution</div>
                                                    <div className="info-value">{viewImage.size}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="drawer-foot">
                                <button className="btn btn-dl" onClick={e => downloadImg(viewImage, e)}>download</button>
                                <button className="btn btn-del-outline" onClick={() => deleteOne(viewImage.id)}>delete</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── Lightbox ── */}
                {lightboxSrc && (
                    <div className="lightbox-overlay" onClick={() => setLightboxSrc(null)}>
                        <img src={lightboxSrc} draggable="false" onClick={e => e.stopPropagation()} />
                    </div>
                )}

                {/* ── Confirm modal ── */}
                {confirm && (
                    <Confirm title={confirm.title} body={confirm.body} confirmLabel={confirm.confirmLabel}
                        onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />
                )}

                {/* ── Mobile tab bar ── */}
                <nav className="tab-bar">
                    <button className={`tab-btn${mobileTab === "settings" ? " active" : ""}`} onClick={() => setMobileTab("settings")}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 21, height: 21 }}>
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                        settings
                    </button>
                    <button className={`tab-btn${mobileTab === "gallery" ? " active" : ""}`} onClick={() => setMobileTab("gallery")}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 21, height: 21 }}>
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        gallery
                        {history.length > 0 && <span style={{ fontSize: 10, color: "var(--text3)", marginTop: -2 }}>{history.length}</span>}
                    </button>
                </nav>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
