<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>Visions Studio</title>
        <link rel="icon" type="image/png" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-9o6hjrus.png" />
        <link rel="apple-touch-icon" href="https://file.garden/ZoJwS5NTJ2m5IEiz/vision-9o6hjrus.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Visions Studio" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="theme-color" content="#06060c" />
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #06060c;
                --surface: #0b0b14;
                --surf2: #10101e;
                --surf3: #171728;
                --surf4: #1e1e34;
                --border: rgba(255, 255, 255, 0.04);
                --border2: rgba(255, 255, 255, 0.07);
                --border3: rgba(255, 255, 255, 0.12);
                --purple: #8b5cf6;
                --purple-h: #7c4ef0;
                --purple-d: rgba(139, 92, 246, 0.1);
                --purple-r: rgba(139, 92, 246, 0.18);
                --pink: #ec4899;
                --pink-d: rgba(236, 72, 153, 0.08);
                --pink-b: rgba(236, 72, 153, 0.18);
                --red: #f43f5e;
                --red-d: rgba(244, 63, 94, 0.08);
                --red-b: rgba(244, 63, 94, 0.15);
                --text: #e2e2f0;
                --text2: #7e7e9a;
                --text3: #43435e;
                --r: 8px;
                --r-sm: 5px;
                --r-lg: 12px;
                --ease: cubic-bezier(0.22, 1, 0.36, 1);
                --ease2: cubic-bezier(0.4, 0, 0.2, 1);
                --grad: linear-gradient(135deg, var(--purple), var(--pink));
            }
            * {
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent;
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            input,
            textarea,
            select {
                user-select: text;
                -webkit-user-select: text;
            }
            img {
                -webkit-user-drag: none;
                user-drag: none;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                overflow: hidden;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }
            ::-webkit-scrollbar {
                width: 3px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(139, 92, 246, 0.18);
                border-radius: 99px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(139, 92, 246, 0.35);
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                }
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(6px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            @keyframes slideDown {
                from {
                    opacity: 1;
                    transform: none;
                }
                to {
                    opacity: 0;
                    transform: translateY(6px) scale(0.98);
                }
            }
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                }
                to {
                    transform: translateX(0);
                }
            }
            @keyframes slideOutRight {
                from {
                    transform: translateX(0);
                }
                to {
                    transform: translateX(100%);
                }
            }
            @keyframes cardPop {
                from {
                    opacity: 0;
                    transform: translateY(8px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            @keyframes cardRemove {
                from {
                    opacity: 1;
                    transform: scale(1);
                }
                to {
                    opacity: 0;
                    transform: scale(0.93);
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }
            @keyframes glowPulse {
                0%,
                100% {
                    box-shadow: 0 2px 16px rgba(139, 92, 246, 0.25);
                }
                50% {
                    box-shadow: 0 4px 28px rgba(139, 92, 246, 0.45);
                }
            }
            .app {
                display: flex;
                height: 100vh;
                width: 100vw;
                animation: fadeIn 0.4s var(--ease2) both;
            }
            .sidebar {
                width: 280px;
                flex-shrink: 0;
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                height: 100vh;
                z-index: 10;
                position: relative;
            }
            .sidebar::after {
                content: "";
                position: absolute;
                top: 0;
                right: -1px;
                width: 1px;
                height: 100%;
                background: linear-gradient(
                    180deg,
                    rgba(139, 92, 246, 0.25) 0%,
                    rgba(236, 72, 153, 0.12) 50%,
                    transparent 100%
                );
                pointer-events: none;
            }
            .sidebar-body {
                flex: 1;
                overflow-y: auto;
                padding: 20px 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .sidebar-foot {
                padding: 14px 16px;
                border-top: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 10px;
                background: var(--surface);
            }
            .wordmark {
                font-family: "Outfit", sans-serif;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                background: var(--grad);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.2));
            }
            .field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .label {
                font-size: 10.5px;
                font-weight: 600;
                color: var(--text3);
                letter-spacing: 0.05em;
                text-transform: lowercase;
            }
            .inp {
                background: var(--surf2);
                border: 1px solid var(--border2);
                border-radius: var(--r);
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                font-size: 13px;
                padding: 0 12px;
                height: 38px;
                width: 100%;
                transition:
                    border-color 0.2s var(--ease2),
                    background 0.2s var(--ease2),
                    box-shadow 0.2s var(--ease2);
                appearance: none;
                -webkit-appearance: none;
            }
            .inp:hover {
                border-color: var(--border3);
                background: var(--surf3);
            }
            .inp:focus {
                outline: none;
                border-color: rgba(139, 92, 246, 0.45);
                background: var(--surf3);
                box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            }
            .inp::placeholder {
                color: var(--text3);
            }
            select.inp {
                cursor: pointer;
            }
            textarea.inp {
                height: 110px;
                padding: 10px 12px;
                resize: none;
                line-height: 1.55;
            }
            .inp-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .flash-warn {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                padding: 10px 12px;
                background: var(--purple-d);
                border: 1px solid var(--purple-r);
                border-radius: var(--r);
                font-size: 12px;
                color: rgba(180, 150, 255, 0.85);
                line-height: 1.45;
            }
            .flash-warn svg {
                flex-shrink: 0;
                margin-top: 1px;
            }
            .btn {
                border: none;
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                border-radius: var(--r);
                font-size: 13px;
                transition: all 0.18s var(--ease2);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }
            .btn:active:not(:disabled) {
                transform: scale(0.97);
            }
            .btn-primary {
                background: var(--grad);
                color: #fff;
                height: 42px;
                width: 100%;
                letter-spacing: 0.01em;
                box-shadow: 0 2px 16px rgba(139, 92, 246, 0.2);
            }
            .btn-primary:hover:not(:disabled) {
                box-shadow: 0 4px 24px rgba(139, 92, 246, 0.35);
                transform: translateY(-1px);
            }
            .btn-primary:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .btn-primary.loading {
                animation: glowPulse 1.8s ease-in-out infinite;
            }
            .btn-stop {
                background: var(--red);
                color: #fff;
                height: 42px;
                padding: 0 16px;
                flex-shrink: 0;
                border-radius: var(--r);
                border: none;
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                font-size: 13px;
                transition: all 0.18s var(--ease2);
            }
            .btn-stop:hover {
                opacity: 0.85;
            }
            .btn-ghost {
                background: transparent;
                color: var(--text2);
                border: 1px solid var(--border2);
                padding: 0 12px;
                height: 34px;
                font-size: 12.5px;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                border-radius: var(--r);
                cursor: pointer;
                transition: all 0.18s var(--ease2);
                gap: 6px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .btn-ghost:hover {
                background: var(--surf2);
                color: var(--text);
                border-color: var(--border3);
            }
            .btn-ghost:active {
                transform: scale(0.97);
            }
            .btn-danger {
                background: var(--red);
                color: #fff;
                padding: 0 14px;
                height: 34px;
                font-size: 12.5px;
                border: none;
                border-radius: var(--r);
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                transition: all 0.18s var(--ease2);
            }
            .btn-danger:hover {
                opacity: 0.85;
            }
            .btn-danger:active {
                transform: scale(0.97);
            }
            .btn-row {
                display: flex;
                gap: 8px;
            }
            .btn-row .btn-primary {
                flex: 1;
            }
            .download-btn {
                background: var(--purple-d);
                color: var(--purple);
                padding: 0 14px;
                height: 34px;
                font-size: 12.5px;
                border: 1px solid var(--purple-r);
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                border-radius: var(--r);
                transition: all 0.18s var(--ease2);
            }
            .download-btn:hover {
                background: rgba(139, 92, 246, 0.18);
                color: #fff;
            }
            .error-box {
                display: flex;
                gap: 10px;
                padding: 11px 13px;
                border-radius: var(--r);
                align-items: flex-start;
            }
            .error-box svg {
                flex-shrink: 0;
                margin-top: 1px;
            }
            .error-api {
                background: var(--purple-d);
                border: 1px solid var(--purple-r);
            }
            .error-api .error-title {
                color: var(--purple);
            }
            .error-api .error-detail {
                color: rgba(160, 130, 240, 0.75);
            }
            .error-app {
                background: var(--pink-d);
                border: 1px solid var(--pink-b);
            }
            .error-app .error-title {
                color: var(--pink);
            }
            .error-app .error-detail {
                color: rgba(236, 72, 153, 0.65);
            }
            .error-title {
                font-size: 12px;
                font-weight: 700;
                margin-bottom: 2px;
            }
            .error-detail {
                font-size: 12px;
                line-height: 1.4;
            }
            .main {
                flex: 1;
                overflow-y: auto;
                padding: 28px 30px;
                height: 100vh;
                background: var(--bg);
                background-image: radial-gradient(
                    ellipse 55% 35% at 65% 8%,
                    rgba(139, 92, 246, 0.035) 0%,
                    transparent 70%
                );
            }
            .main-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 24px;
            }
            .page-title {
                font-family: "Outfit", sans-serif;
                font-size: 17px;
                font-weight: 700;
                background: linear-gradient(105deg, var(--text) 40%, var(--text2));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .page-sub {
                font-size: 12px;
                color: var(--text3);
                margin-top: 3px;
                letter-spacing: 0.02em;
            }
            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
                touch-action: auto;
            }
            .img-card {
                position: relative;
                border-radius: var(--r-lg);
                overflow: hidden;
                border: 1px solid var(--border);
                cursor: pointer;
                background: var(--surf2);
                transition:
                    border-color 0.25s var(--ease2),
                    box-shadow 0.25s var(--ease2),
                    transform 0.25s var(--ease);
                animation: cardPop 0.3s var(--ease) both;
            }
            .img-card.removing {
                animation: cardRemove 0.25s var(--ease2) both;
                pointer-events: none;
            }
            .img-card:hover {
                border-color: rgba(139, 92, 246, 0.25);
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.4),
                    0 0 0 1px rgba(139, 92, 246, 0.06);
                transform: translateY(-2px);
            }
            .img-card.selected {
                border-color: var(--purple);
                box-shadow:
                    0 0 0 1px var(--purple),
                    0 0 20px rgba(139, 92, 246, 0.12);
            }
            .img-card.selected:hover {
                box-shadow:
                    0 0 0 1px var(--purple),
                    0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .img-card img {
                width: 100%;
                aspect-ratio: 1/1;
                object-fit: cover;
                display: block;
            }
            .card-overlay {
                position: absolute;
                inset: 0;
                opacity: 0;
                transition: opacity 0.25s var(--ease2);
                background: linear-gradient(
                    180deg,
                    rgba(6, 6, 12, 0.5) 0%,
                    transparent 40%,
                    transparent 60%,
                    rgba(6, 6, 12, 0.7) 100%
                );
            }
            .img-card:hover .card-overlay,
            .img-card.selected .card-overlay {
                opacity: 1;
            }
            .card-top {
                position: absolute;
                top: 8px;
                left: 8px;
                right: 8px;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }
            .check {
                width: 22px;
                height: 22px;
                border-radius: var(--r-sm);
                background: rgba(0, 0, 0, 0.45);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.12);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.15s var(--ease2);
            }
            .check:active {
                transform: scale(0.88);
            }
            .img-card.selected .check {
                background: var(--purple);
                border-color: var(--purple);
            }
            .del-btn {
                background: rgba(0, 0, 0, 0.45);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: rgba(255, 255, 255, 0.7);
                border-radius: var(--r-sm);
                padding: 4px 9px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                transition: all 0.15s var(--ease2);
            }
            .del-btn:hover {
                background: var(--red);
                color: #fff;
                border-color: var(--red);
            }
            .prompt-fade {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 36px 10px 10px;
                background: linear-gradient(transparent, rgba(6, 6, 12, 0.9));
                pointer-events: none;
            }
            .prompt-fade p {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.4);
                line-height: 1.4;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 100px 24px;
                text-align: center;
            }
            .empty-icon {
                width: 50px;
                height: 50px;
                border-radius: var(--r-lg);
                background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.06));
                border: 1px solid rgba(139, 92, 246, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                margin-bottom: 8px;
                color: var(--purple);
                filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.15));
            }
            .empty p {
                font-size: 14px;
                font-weight: 600;
                color: var(--text2);
            }
            .empty span {
                font-size: 12.5px;
                color: var(--text3);
            }
            .drawer-overlay {
                position: fixed;
                inset: 0;
                z-index: 50;
                background: rgba(4, 4, 8, 0.55);
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
                display: flex;
                justify-content: flex-end;
                animation: fadeIn 0.15s ease both;
            }
            .drawer-overlay.closing {
                animation: fadeOut 0.22s var(--ease2) both;
            }
            .drawer {
                width: 500px;
                max-width: 100%;
                height: 100%;
                background: var(--surface);
                border-left: 1px solid rgba(139, 92, 246, 0.12);
                display: flex;
                flex-direction: column;
                animation: slideInRight 0.28s var(--ease) both;
                box-shadow: -16px 0 48px rgba(0, 0, 0, 0.35);
            }
            .drawer.closing {
                animation: slideOutRight 0.25s var(--ease2) both;
            }
            .drawer-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 16px;
                height: 48px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .drawer-tabs {
                display: flex;
                height: 100%;
                gap: 0;
            }
            .drawer-tab {
                height: 100%;
                padding: 0 14px;
                font-size: 13px;
                font-weight: 600;
                font-family: "DM Sans", sans-serif;
                color: var(--text3);
                background: none;
                border: none;
                border-bottom: 2px solid transparent;
                cursor: pointer;
                transition:
                    color 0.2s var(--ease2),
                    border-color 0.2s var(--ease2);
            }
            .drawer-tab:hover {
                color: var(--text2);
            }
            .drawer-tab.active {
                color: var(--text);
                border-image: var(--grad) 1;
            }
            .drawer-close {
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: none;
                border: 1px solid var(--border2);
                border-radius: var(--r-sm);
                color: var(--text3);
                cursor: pointer;
                transition: all 0.15s var(--ease2);
            }
            .drawer-close:hover {
                color: var(--text);
                background: var(--surf2);
            }
            .drawer-body {
                flex: 1;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .drawer-preview {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                overflow: hidden;
                background: var(--bg);
            }
            .drawer-preview img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                border-radius: var(--r-sm);
            }
            .drawer-info {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 18px;
            }
            .info-block {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .info-label {
                font-size: 10.5px;
                font-weight: 600;
                text-transform: lowercase;
                letter-spacing: 0.05em;
                color: var(--text3);
            }
            .info-value {
                font-size: 13px;
                color: var(--text2);
                line-height: 1.5;
            }
            .info-prompt-box {
                font-size: 13px;
                color: var(--text2);
                line-height: 1.6;
                padding: 10px 12px;
                background: var(--bg);
                border: 1px solid rgba(139, 92, 246, 0.1);
                border-radius: var(--r);
                max-height: 140px;
                overflow-y: auto;
                user-select: text;
                -webkit-user-select: text;
            }
            .info-copy-btn {
                font-size: 11px;
                font-weight: 600;
                color: var(--purple);
                background: none;
                border: none;
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                padding: 0;
                transition: opacity 0.15s;
            }
            .info-copy-btn:hover {
                opacity: 0.65;
            }
            .info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

    <body>
        <div id="root"></div>
        <script type="text/babel">
            const { useState, useEffect, useRef } = React;
            const MODELS = [
                { id: "gemini-3-pro-image", label: "Gemini 3 Pro Image", group: "Gemini", provider: "gemini" },
                {
                    id: "gemini-3.1-flash-image-preview",
                    label: "Gemini 3.1 Flash",
                    group: "Gemini",
                    provider: "gemini",
                },
                { id: "gpt-image-1.5", label: "GPT Image 1.5", group: "OpenAI", provider: "openai" },
                { id: "midjourney", label: "Midjourney", group: "Midjourney", provider: "midjourney" },
                { id: "bria/image-3.2", label: "Bria 3.2", group: "Bria", provider: "bria" },
                { id: "flux-2-max", label: "Flux 2 Max", group: "Flux", provider: "flux" },
                {
                    id: "stability-ai/stable-diffusion-3.5-large",
                    label: "SD 3.5 Large",
                    group: "Stable Diffusion",
                    provider: "sd",
                },
                {
                    id: "stability-ai/stable-diffusion-3.5-large-turbo",
                    label: "SD 3.5 Large Turbo",
                    group: "Stable Diffusion",
                    provider: "sd",
                },
                {
                    id: "stability-ai/stable-diffusion-3.5-medium",
                    label: "SD 3.5 Medium",
                    group: "Stable Diffusion",
                    provider: "sd",
                },
            ];
            const MODEL_MAP = Object.fromEntries(MODELS.map((m) => [m.id, m]));
            const OPENAI_SIZES = { "gpt-image-1.5": ["1024x1024", "1536x1024", "1024x1536"] };
            const BRIA_RATIOS = ["1:1", "2:3", "3:2", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9"];
            const GEMINI_PRO_RATIOS = ["1:1", "3:2", "2:3", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9", "21:9"];
            const GEMINI_FLASH_RATIOS = [...GEMINI_PRO_RATIOS, "1:4", "4:1", "1:8", "8:1"];
            const SD_RATIOS = ["1:1", "16:9", "21:9", "2:3", "3:2", "4:5", "5:4", "9:16", "9:21"];
            const MODEL_GROUPS = MODELS.reduce((a, m) => {
                if (!a[m.group]) a[m.group] = [];
                a[m.group].push(m);
                return a;
            }, {});
            const clampFluxDim = (v) => {
                let n = parseInt(v) || 1024;
                if (n > 2048) n = 2048;
                if (n < 64) n = 64;
                n = Math.round(n / 16) * 16;
                return Math.min(2048, n);
            };
            const DB_NAME = "VisionsStudio",
                STORE = "images";
            const initDB = () =>
                new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = (e) => {
                        if (!e.target.result.objectStoreNames.contains(STORE))
                            e.target.result.createObjectStore(STORE, { keyPath: "id" });
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = () =>
                        reject(new Error("can't open local storage. private browsing might be blocking it"));
                });
            const parseError = (raw, type = "api") => {
                const s = String(raw || "");
                if (type === "app") {
                    if (s.includes("KEY & PROMPT"))
                        return { type: "app", title: "missing info", detail: "add your api key and a prompt first" };
                    return { type: "app", title: "something went wrong", detail: s || "not sure what happened" };
                }
                if (s.includes("400"))
                    return {
                        type: "api",
                        title: "bad request (400)",
                        detail: "the request failed validation. check your model, prompt, and settings",
                    };
                if (s.includes("401"))
                    return {
                        type: "api",
                        title: "invalid key (401)",
                        detail: "your api key was rejected. make sure it's correct and still active",
                    };
                if (s.includes("403"))
                    return {
                        type: "api",
                        title: "access blocked (403)",
                        detail: "the request was blocked. your key might not have access to this model, or the request shape was rejected",
                    };
                if (s.includes("413"))
                    return {
                        type: "api",
                        title: "too large (413)",
                        detail: "the request was too big. try compressing or removing attached images",
                    };
                if (s.includes("429"))
                    return {
                        type: "api",
                        title: "rate limited (429)",
                        detail: "too many requests. wait a moment and try again",
                    };
                if (s.includes("503") || s.includes("504") || s.includes("524"))
                    return {
                        type: "api",
                        title: "service unavailable",
                        detail: "the api is temporarily down or timed out. try again in a minute",
                    };
                if (s.includes("500"))
                    return {
                        type: "api",
                        title: "server error (500)",
                        detail: "something broke on the api side. not your fault, try again",
                    };
                return { type: "api", title: "request failed", detail: s || "no details available" };
            };
            const urlToDataUrl = async (url) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) return url;
                    const blob = await res.blob();
                    return new Promise((resolve) => {
                        const r = new FileReader();
                        r.onload = () => resolve(r.result);
                        r.onerror = () => resolve(url);
                        r.readAsDataURL(blob);
                    });
                } catch {
                    return url;
                }
            };
            const poll = (fn, check, ms = 4000, signal, maxAttempts = 70) =>
                new Promise((resolve, reject) => {
                    let attempts = 0;
                    const run = async () => {
                        if (signal?.aborted) return reject(new DOMException("Aborted", "AbortError"));
                        if (attempts >= maxAttempts)
                            return reject(new Error("timed out waiting. the model might be busy, try again"));
                        attempts++;
                        try {
                            const result = await fn();
                            if (check(result)) return resolve(result);
                            setTimeout(run, ms);
                        } catch (e) {
                            reject(e);
                        }
                    };
                    run();
                });
            const saveImg = (db, src, prompt, meta = {}) => {
                const img = {
                    id: Date.now() + Math.random(),
                    src,
                    prompt,
                    timestamp: new Date().toLocaleString(),
                    model: meta.model || null,
                    modelLabel: meta.modelLabel || null,
                    provider: meta.provider || null,
                    ratio: meta.ratio || null,
                    size: meta.size || null,
                    negativePrompt: meta.negativePrompt || null,
                    seed: meta.seed || null,
                    steps: meta.steps || null,
                    guidance: meta.guidance || null,
                };
                db.transaction(STORE, "readwrite").objectStore(STORE).add(img);
                return img;
            };
            const genGemini = async (db, { apiKey, model, prompt, ratio, size, refImages, signal }) => {
                const isFlash = model.includes("flash");
                const imageParts = refImages.map((r) => ({ inlineData: { mimeType: r.mediaType, data: r.base64 } }));
                const imageConfig = isFlash ? { aspectRatio: ratio } : { aspectRatio: ratio, imageSize: size };
                const body = {
                    contents: [{ role: "user", parts: [...imageParts, { text: prompt }] }],
                    generationConfig: { responseModalities: ["TEXT", "IMAGE"], imageConfig },
                };
                const res = await fetch(`https://api.cometapi.com/v1beta/models/${model}:generateContent`, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                    body: JSON.stringify(body),
                    signal,
                });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    throw new Error(`${res.status}: ${d.error?.message || "unknown error"}`);
                }
                const data = await res.json();
                const b64 = data?.candidates?.[0]?.content?.parts?.find((p) => p.inlineData)?.inlineData?.data;
                if (!b64) {
                    const txt = data?.candidates?.[0]?.content?.parts?.find((p) => p.text)?.text;
                    throw new Error(
                        txt
                            ? `model returned text instead of an image: "${txt.slice(0, 120)}"`
                            : "no image returned. try a different prompt"
                    );
                }
                return saveImg(db, `data:image/png;base64,${b64}`, prompt, {
                    model,
                    modelLabel: MODEL_MAP[model]?.label,
                    provider: "gemini",
                    ratio,
                    size: isFlash ? null : size,
                });
            };
            const genOpenAI = async (db, { apiKey, model, prompt, openaiSize, signal }) => {
                const body = { model, prompt, n: 1, size: openaiSize || "1024x1024" };
                const res = await fetch("https://api.cometapi.com/v1/images/generations", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                    body: JSON.stringify(body),
                    signal,
                });
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    throw new Error(`${res.status}: ${errorData.error?.message || "unknown error"}`);
                }
                const data = await res.json();
                const item = data?.data?.[0];
                if (!item) return null;
                const src = item.b64_json ? `data:image/png;base64,${item.b64_json}` : await urlToDataUrl(item.url);
                return src
                    ? saveImg(db, src, prompt, {
                          model,
                          modelLabel: MODEL_MAP[model]?.label || "OpenAI",
                          provider: "openai",
                          size: openaiSize,
                      })
                    : null;
            };
            const genMidjourney = async (db, { apiKey, prompt, batchSize, mjSpeed, signal, setStatusMsg }) => {
                setStatusMsg("submitting to midjourney...");
                const baseUrl =
                    mjSpeed === "turbo"
                        ? "https://api.cometapi.com/mj-turbo/mj/submit/imagine"
                        : mjSpeed === "relax"
                          ? "https://api.cometapi.com/mj/submit/imagine"
                          : "https://api.cometapi.com/mj-fast/mj/submit/imagine";
                const submitRes = await fetch(baseUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                    body: JSON.stringify({ prompt, botType: "MID_JOURNEY" }),
                    signal,
                });
                if (!submitRes.ok) {
                    const err = await submitRes.json().catch(() => ({}));
                    throw new Error(`${submitRes.status}: ${err.description || err.error?.message || "unknown error"}`);
                }
                const submitData = await submitRes.json();
                const taskId = submitData.result;
                if (!taskId) throw new Error("midjourney returned no task id");
                const fetchTask = async (id) => {
                    const r = await fetch(`https://api.cometapi.com/mj/task/${id}/fetch`, {
                        headers: { Authorization: `Bearer ${apiKey}` },
                        signal,
                    });
                    return r.json();
                };
                setStatusMsg("midjourney is working...");
                const gridResult = await poll(
                    () => fetchTask(taskId),
                    (r) => r.status === "SUCCESS" || r.status === "FAILURE",
                    5000,
                    signal,
                    70
                );
                if (gridResult.status === "FAILURE") throw new Error("midjourney generation failed");
                const upscaleButtons = (gridResult.buttons || [])
                    .filter((b) => /^U[1-4]$/.test(b.label))
                    .slice(0, batchSize);
                if (!upscaleButtons.length) {
                    const src = await urlToDataUrl(gridResult.imageUrl);
                    return [
                        saveImg(db, src, prompt, {
                            model: "midjourney",
                            modelLabel: "Midjourney",
                            provider: "midjourney",
                        }),
                    ];
                }
                const results = [];
                for (let i = 0; i < upscaleButtons.length; i++) {
                    if (signal?.aborted) break;
                    const btn = upscaleButtons[i];

                    const actionRes = await fetch("https://api.cometapi.com/mj/submit/action", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                        body: JSON.stringify({ taskId, customId: btn.customId }),

                    });
                    if (!actionRes.ok) {
                        const err = await actionRes.json().catch(() => ({}));
                        throw new Error(`${actionRes.status}: ${err.error?.message || "unknown error"}`);
                    }
                    const actionData = await actionRes.json();
                    const upscaleId = actionData.result;
                    if (!upscaleId) continue;
                    const upscaleResult = await poll(

                    );
                    if (upscaleResult.status === "SUCCESS" && upscaleResult.imageUrl) {

                            saveImg(db, src, prompt, {
                                model: "midjourney",
                                modelLabel: "Midjourney",
                                provider: "midjourney",
                            })
                        );
                    }
                }
                return results;
            };
            const genBria = async (
                db,
                { apiKey, prompt, negativePrompt, ratio, batchSize, briaSteps, briaGuidance, briaSeed, signal }
            ) => {
                const body = {
                    prompt,
                    num_results: batchSize,
                    aspect_ratio: ratio,
                    sync: true,
                    steps_num: briaSteps,
                    text_guidance_scale: briaGuidance,
                    enhance_image: true,
                };
                if (negativePrompt && negativePrompt.trim()) body.negative_prompt = negativePrompt.trim();
                if (briaSeed !== "" && !isNaN(parseInt(briaSeed))) body.seed = parseInt(briaSeed);
                const res = await fetch("https://api.cometapi.com/bria/text-to-image", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                    body: JSON.stringify(body),
                    signal,
                });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    throw new Error(`${res.status}: ${d.error?.message || "unknown error"}`);
                }
                const data = await res.json();
                const results = [];
                for (const item of data?.result || []) {
                    for (const url of item.urls || []) {
                        const src = await urlToDataUrl(url);
                        results.push(
                            saveImg(db, src, prompt, {
                                model: "bria/image-3.2",
                                modelLabel: "Bria 3.2",

                            })

                    }
                }
                return results;
            };
            const genFlux = async (db, { apiKey, model, prompt, fluxWidth, fluxHeight, signal, setStatusMsg }) => {
                const body = { prompt, width: parseInt(fluxWidth) || 1024, height: parseInt(fluxHeight) || 1024 };
                const res = await fetch(`https://api.cometapi.com/flux/v1/${model}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
                    body: JSON.stringify(body),
                    signal,
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(`${res.status}: ${err.error?.message || err.detail || "unknown error"}`);
                }
                const submitData = await res.json();
                const taskId = submitData.id;
                if (!taskId) throw new Error("no task id returned from flux");
                const pollUrl = `https://api.cometapi.com/flux/v1/get_result?id=${taskId}`;
                const MAX = 90;
                let attempts = 0;
                const xImg = (r) =>
                    r?.data?.result_url ||
                    r?.data?.data?.result?.sample ||
                    r?.data?.result?.sample ||
                    r?.result?.sample ||
                    null;
                const xStat = (r) => (r?.data?.status || r?.data?.data?.status || r?.status || "").toUpperCase();
                while (attempts < MAX) {
                    if (signal?.aborted) throw new DOMException("Aborted", "AbortError");
                    attempts++;
                    await new Promise((rh) => setTimeout(rh, 3000));
                    setStatusMsg(`flux is working... (poll ${attempts})`);
                    try {
                        const pollRes = await fetch(pollUrl, {
                            headers: { Authorization: `Bearer ${apiKey}` },
                            signal,
                        });
                        if (!pollRes.ok) {
                            if (attempts > 10) throw new Error(`flux polling failed: HTTP ${pollRes.status}`);
                            continue;
                        }
                        const r = await pollRes.json();
                        const status = xStat(r);
                        const imageUrl = xImg(r);
                        if (status === "SUCCESS" || status === "READY" || status === "SUCCEEDED") {
                            if (!imageUrl) throw new Error("flux finished but no image url found");
                            const src = await urlToDataUrl(imageUrl);
                            return saveImg(db, src, prompt, {
                                model,
                                modelLabel: "Flux 2 Max",
                                provider: "flux",
                                size: `${fluxWidth}x${fluxHeight}`,
                            });
                        }
                        if (status === "FAILED" || status === "ERROR" || status === "CANCELED")
                            throw new Error(r?.data?.fail_reason || "flux generation failed");
                        if (imageUrl && r?.data?.progress === "100%") {
                            const src = await urlToDataUrl(imageUrl);
                            return saveImg(db, src, prompt, {
                                model,
                                modelLabel: "Flux 2 Max",
                                provider: "flux",
                                size: `${fluxWidth}x${fluxHeight}`,
                            });
                        }
                    } catch (e) {
                        if (e.name === "AbortError") throw e;
                        if (attempts > 10) throw e;
                    }
                }
                throw new Error("timed out waiting for flux after ~4.5 min");
            };
            const genSD = async (
                db,
                {
                    apiKey,
                    model,
                    prompt,
                    negativePrompt,
                    sdSize,
                    sdSteps,
                    sdGuidance,
                    sdSeed,
                    sdInputImage,
                    sdPromptStrength,
                    signal,
                }
            ) => {
                const actualSeed =
                    sdSeed !== "" && !isNaN(parseInt(sdSeed))
                        ? parseInt(sdSeed)
                        : Math.floor(Math.random() * 2147483647);
                const input = { prompt, seed: actualSeed };
                if (sdInputImage) {
                    input.image = sdInputImage.dataUrl;
                    input.prompt_strength = sdPromptStrength;
                } else {
                    input.aspect_ratio = sdSize || "1:1";
                }
                if (negativePrompt?.trim()) input.negative_prompt = negativePrompt.trim();
                if (sdSteps != null) input.num_inference_steps = parseInt(sdSteps);
                if (sdGuidance != null) input.guidance_scale = parseFloat(sdGuidance);
                const createRes = await fetch(`https://api.cometapi.com/replicate/v1/models/${model}/predictions`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${apiKey}`,
                        Prefer: "wait=55",
                    },
                    body: JSON.stringify({ input }),
                    signal,
                });
                console.log("[SD] Create status:", createRes.status, createRes.statusText);
                const createText = await createRes.text();
                console.log("[SD] Create body:", createText);
                if (!createRes.ok) throw new Error(`${createRes.status}: ${createText}`);
                let prediction;
                try {
                    prediction = JSON.parse(createText);
                } catch {
                    throw new Error("non-JSON response: " + createText.slice(0, 300));
                }
                const pollUrl = prediction?.urls?.get;
                let output = prediction?.output;
                if (!output && pollUrl) {
                    for (let i = 0; i < 60; i++) {
                        if (signal?.aborted) throw new DOMException("Aborted", "AbortError");
                        await new Promise((r) => setTimeout(r, 3000));
                        const pollRes = await fetch(pollUrl, {
                            headers: { Authorization: `Bearer ${apiKey}` },
                            signal,
                        });
                        const pollData = await pollRes.json();
                        console.log("[SD] Poll status:", pollData.status);
                        if (pollData.status === "succeeded") {
                            output = pollData.output;
                            break;
                        }
                        if (pollData.status === "failed") throw new Error("SD generation failed: " + pollData.error);
                    }
                }
                const outputUrl = Array.isArray(output) ? output[0] : output;
                if (!outputUrl) throw new Error("no image returned from stable diffusion");
                const src = await urlToDataUrl(outputUrl);
                if (!src) throw new Error("failed to retrieve generated image");
                return saveImg(db, src, prompt, {
                    model,
                    modelLabel: MODEL_MAP[model]?.label,
                    provider: "sd",
                    size: sdSize,
                    negativePrompt: negativePrompt?.trim() || null,
                    steps: sdSteps,
                    guidance: sdGuidance,
                    seed: actualSeed,
                    promptStrength: sdInputImage ? sdPromptStrength : null,
                });
            };

                const close = () => {
                    setClosing(true);
                    setTimeout(onCancel, 200);
                };
                const doConfirm = () => {
                    setClosing(true);
                    setTimeout(onConfirm, 200);
                };
                return (
                    <div className={`overlay${closing ? " closing" : ""}`} onClick={close}>
                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                            <div className="modal-title">{title}</div>
                            <div className="modal-body">{body}</div>
                            <div className="modal-actions">
                                <button className="btn btn-ghost" style={{ fontSize: 12 }} onClick={close}>
                                    never mind
                                </button>
                                <button className="btn btn-danger" style={{ fontSize: 12 }} onClick={doConfirm}>
                                    {confirmLabel}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
