                                            >
                                                <option value="fast">fast</option>
                                                <option value="turbo">turbo</option>
                                                <option value="relax">relax</option>
                                            </select>
                                        </div>
                                        <div className="flash-warn">
                                            <svg
                                                width="13"
                                                height="13"
                                                viewBox="0 0 24 24"
                                                fill="none"
                                                stroke="currentColor"
                                                strokeWidth="2.5"
                                            >
                                                <circle cx="12" cy="12" r="10" />
                                                <line x1="12" y1="8" x2="12" y2="12" />
                                                <line x1="12" y1="16" x2="12.01" y2="16" />
                                            </svg>
                                            use --ar in your prompt for ratio. batch count controls how many get
                                            upscaled
                                        </div>
                                    </>
                                )}

                                {provider === "gemini" && (
                                    <div className="field">
                                        <div
                                            style={{
                                                display: "flex",
                                                justifyContent: "space-between",
                                                alignItems: "center",
                                            }}
                                        >
                                            <label className="label">
                                                references{" "}
                                                <span
                                                    style={{
                                                        fontWeight: 400,
                                                        color: "var(--text3)",
                                                        textTransform: "none",
                                                        letterSpacing: 0,
                                                    }}
                                                >
                                                    optional
                                                </span>
                                            </label>
                                            {refImages.length > 1 && (
                                                <button
                                                    onClick={clearRefs}
                                                    style={{
                                                        background: "none",
                                                        border: "none",
                                                        color: "var(--text3)",
                                                        fontSize: 11,
                                                        fontWeight: 600,
                                                        cursor: "pointer",
                                                        fontFamily: "'DM Sans',sans-serif",
                                                        padding: 0,
                                                    }}
                                                >
                                                    clear
                                                </button>
                                            )}
                                        </div>
                                        <input
                                            ref={fileInputRef}
                                            type="file"
                                            accept="image/*"
                                            multiple
                                            style={{ display: "none" }}
                                            onChange={handleRefFiles}
                                        />
                                        <div
                                            className="ref-drop"
                                            style={
                                                dragging
                                                    ? {
                                                          borderColor: "var(--purple)",
                                                          background: "rgba(139,92,246,.04)",
                                                      }
                                                    : {}
                                            }
                                            onClick={() => fileInputRef.current.click()}
                                            onDragOver={(e) => {
                                                e.preventDefault();
                                                setDragging(true);
                                            }}
                                            onDragLeave={() => setDragging(false)}
                                            onDrop={handleDrop}
                                        >
                                            <span className="ref-drop-label">
                                                <svg
                                                    width="14"
                                                    height="14"
                                                    viewBox="0 0 24 24"
                                                    fill="none"
                                                    stroke="currentColor"
                                                    strokeWidth="2.5"
                                                    strokeLinecap="round"
                                                >
                                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                                                    <polyline points="17 8 12 3 7 8" />
                                                    <line x1="12" y1="3" x2="12" y2="15" />
                                                </svg>
                                                {dragging ? "drop to add" : "drop images here or click"}
                                            </span>
                                        </div>
                                        {refImages.length > 0 && (
                                            <div className="ref-thumbs">
                                                {refImages.map((r) => (
                                                    <div key={r.id} className="ref-thumb">
                                                        <img src={r.preview} />
                                                        <button
                                                            className="ref-thumb-rm"
                                                            onClick={() => removeRef(r.id)}
                                                        >
                                                            x
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="field">
                                    <label className="label">prompt</label>
                                    <textarea
                                        className="inp"
                                        placeholder="describe what you want to see..."
                                        value={prompt}
                                        onChange={(e) => setPrompt(e.target.value)}
                                    />
                                </div>

                                {(provider === "bria" || provider === "sd") && (
                                    <div className="field">
                                        <button
                                            className="neg-prompt-toggle"
                                            onClick={() => setNegPromptOpen((p) => !p)}
                                        >
                                            negative prompt{" "}
                                            <span
                                                style={{
                                                    fontWeight: 400,
                                                    color: "var(--text3)",
                                                    textTransform: "none",
                                                    letterSpacing: 0,
                                                }}
                                            >
                                                optional
                                            </span>
                                            <span className={`neg-prompt-icon${negPromptOpen ? " open" : ""}`}>+</span>
                                        </button>
                                        <div className={`neg-prompt-body${negPromptOpen ? " open" : ""}`}>
                                            <div className="neg-prompt-inner">
                                                <textarea
                                                    className="inp"
                                                    style={{ height: 72 }}
                                                    placeholder="things to keep out of the image..."
                                                    value={negativePrompt}
                                                    onChange={(e) => setNegativePrompt(e.target.value)}
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="field">
                                    <button className="json-toggle" onClick={() => setJsonOpen((p) => !p)}>
                                        request preview
                                        <span className={`json-toggle-icon${jsonOpen ? " open" : ""}`}>+</span>
                                    </button>
                                    <div className={`json-body${jsonOpen ? " open" : ""}`}>
                                        <div className="json-inner">
                                            <div className="json-box">
                                                {JSON.stringify(buildPreviewBody(), null, 2)}
                                            </div>
                                            <button
                                                className="info-copy-btn"
                                                style={{ marginTop: 6 }}
                                                onClick={() =>
                                                    navigator.clipboard.writeText(
                                                        JSON.stringify(buildPreviewBody(), null, 2)
                                                    )
                                                }
                                            >
                                                copy
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="sidebar-foot">
                                {error && (
                                    <div className={`error-box ${error.type === "api" ? "error-api" : "error-app"}`}>
                                        <ErrIco type={error.type} />
                                        <div>
                                            <div className="error-title">{error.title}</div>
                                            <div className="error-detail">{error.detail}</div>
                                        </div>
                                    </div>
                                )}
                                {loading ? (
                                    <div className="btn-row">
                                        <button className="btn btn-primary loading" disabled>
                                            <span className="pulse-text">{statusMsg || "generating..."}</span>
                                        </button>
                                        <button className="btn btn-stop" onClick={cancelBatch}>
                                            stop
                                        </button>
                                    </div>
                                ) : (
                                    <button className="btn btn-primary" onClick={executeBatch}>
                                        generate
                                    </button>
                                )}
                            </div>
                        </aside>

                        <main className={`main${mobileTab === "gallery" ? " tab-active" : ""}`}>
                            <div className="main-header">
                                <div>
                                    <div className="page-title">gallery</div>
                                    <div className="page-sub">
                                        {history.length} image{history.length !== 1 ? "s" : ""}
                                    </div>
                                </div>
                                <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                                    <button onClick={exportVault} className="btn-ghost" style={{ height: 34 }}>
                                        <svg
                                            width="14"
                                            height="14"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            strokeWidth="2.5"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                            style={{ marginRight: 4 }}
                                        >
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                            <polyline points="7 10 12 15 17 10" />
                                            <line x1="12" y1="15" x2="12" y2="3" />
                                        </svg>
                                        backup
                                    </button>
                                    <label
                                        className="btn-ghost"
                                        style={{
                                            height: 34,
                                            cursor: "pointer",
                                            display: "inline-flex",
                                            alignItems: "center",
                                            fontWeight: 600,
                                        }}
                                    >
                                        <svg
                                            width="14"
                                            height="14"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            strokeWidth="2.5"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                            style={{ marginRight: 4 }}
                                        >
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                            <polyline points="17 8 12 3 7 8" />
                                            <line x1="12" y1="3" x2="12" y2="15" />
                                        </svg>
                                        restore
                                        <input
                                            type="file"
                                            accept=".json"
                                            onChange={importVault}
                                            style={{ display: "none" }}
                                        />
                                    </label>
                                </div>
                                {selectedIds.length > 0 && (
                                    <div className="btn-row" style={{ width: "100%" }}>
                                        <button className="download-btn" onClick={downloadBulk}>
                                            download {selectedIds.length}
                                        </button>
                                        <button className="btn btn-danger" onClick={deleteBulk}>
                                            delete {selectedIds.length}
                                        </button>
                                        <button
                                            className="btn btn-ghost"
                                            style={{ height: 34 }}
                                            onClick={() => setSelectedIds([])}
                                        >
                                            cancel
                                        </button>
                                    </div>
                                )}
                            </div>
                            {history.length === 0 ? (
                                <div className="empty">
                                    <div className="empty-icon">✦</div>
                                    <p>nothing here yet</p>
                                    <span>generate something and it will show up here</span>
                                </div>
                            ) : (
                                <div className="gallery">
                                    {history.map((img) => (
                                        <div
                                            key={img.id}
                                            className={`img-card${selectedIds.includes(img.id) ? " selected" : ""}${removingIds.includes(img.id) ? " removing" : ""}`}
                                            onClick={() => openDrawer(img)}
                                        >
                                            <img src={img.src} loading="lazy" draggable="false" />
                                            <div className="card-overlay">
                                                <div className="card-top">
                                                    <div
                                                        className="check"
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            toggleSelect(img.id, e);
                                                        }}
                                                    >
                                                        {selectedIds.includes(img.id) && (
                                                            <svg
                                                                width="11"
                                                                height="11"
                                                                viewBox="0 0 24 24"
                                                                fill="none"
                                                                stroke="#fff"
                                                                strokeWidth="3.5"
                                                            >
                                                                <polyline points="20 6 9 17 4 12" />
                                                            </svg>
                                                        )}
                                                    </div>
                                                    <button className="del-btn" onClick={(e) => deleteOne(img.id, e)}>
                                                        delete
                                                    </button>
                                                </div>
                                                {img.prompt && (
                                                    <div className="prompt-fade">
                                                        <p>{img.prompt}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>

                        {viewImage && (
                            <div className={`drawer-overlay${drawerClosing ? " closing" : ""}`} onClick={closeDrawer}>
                                <div
                                    className={`drawer${drawerClosing ? " closing" : ""}`}
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <div className="drawer-head">
                                        <div className="drawer-tabs">
                                            <button
                                                className={`drawer-tab${drawerTab === "preview" ? " active" : ""}`}
                                                onClick={() => setDrawerTab("preview")}
                                            >
                                                preview
                                            </button>
                                            <button
                                                className={`drawer-tab${drawerTab === "info" ? " active" : ""}`}
                                                onClick={() => setDrawerTab("info")}
                                            >
                                                info
                                            </button>
                                        </div>
                                        <button className="drawer-close" onClick={closeDrawer}>
                                            <svg
                                                width="16"
                                                height="16"
                                                viewBox="0 0 24 24"
                                                fill="none"
                                                stroke="currentColor"
                                                strokeWidth="2.5"
                                                strokeLinecap="round"
                                            >
                                                <line x1="18" y1="6" x2="6" y2="18" />
                                                <line x1="6" y1="6" x2="18" y2="18" />
                                            </svg>
                                        </button>
                                    </div>
                                    <div className="drawer-body">
                                        {drawerTab === "preview" ? (
                                            <div className="drawer-preview">
                                                <img
                                                    src={viewImage.src}
                                                    draggable="false"
                                                    style={{ cursor: "zoom-in" }}
                                                    onClick={() => setLightboxSrc(viewImage.src)}
                                                />
                                            </div>
                                        ) : (
                                            <div className="drawer-info">
                                                <button
                                                    className="btn btn-ghost"
                                                    style={{ width: "100%", justifyContent: "center" }}
                                                    onClick={() => openReuseModal(viewImage)}
                                                >
                                                    <svg
                                                        width="13"
                                                        height="13"
                                                        viewBox="0 0 24 24"
                                                        fill="none"
                                                        stroke="currentColor"
                                                        strokeWidth="2.5"
                                                        strokeLinecap="round"
                                                        strokeLinejoin="round"
                                                    >
                                                        <polyline points="1 4 1 10 7 10" />
                                                        <path d="M3.51 15a9 9 0 105.64-11.36L1 10" />
                                                    </svg>
                                                    reuse settings
                                                </button>
                                                <div className="info-block">
                                                    <div
                                                        style={{
                                                            display: "flex",
                                                            justifyContent: "space-between",
                                                            alignItems: "center",
                                                        }}
                                                    >
                                                        <div className="info-label">prompt</div>
                                                        {viewImage.prompt && (
                                                            <button
                                                                className="info-copy-btn"
                                                                onClick={(e) => copyPrompt(viewImage.prompt, e)}
                                                            >
                                                                copy
                                                            </button>
                                                        )}
                                                    </div>
                                                    <div className="info-prompt-box">
                                                        {viewImage.prompt || "no prompt saved"}
                                                    </div>
                                                </div>
                                                {(viewImage.provider === "bria" || viewImage.provider === "sd") &&
                                                    viewImage.negativePrompt && (
                                                        <div className="info-block">
                                                            <div
                                                                style={{
                                                                    display: "flex",
                                                                    justifyContent: "space-between",
                                                                    alignItems: "center",
                                                                }}
                                                            >
                                                                <div className="info-label">negative prompt</div>
                                                                <button
                                                                    className="info-copy-btn"
                                                                    onClick={(e) =>
                                                                        copyPrompt(viewImage.negativePrompt, e)
                                                                    }
                                                                >
                                                                    copy
                                                                </button>
                                                            </div>
                                                            <div className="info-prompt-box">
                                                                {viewImage.negativePrompt}
                                                            </div>
                                                        </div>
                                                    )}
                                                <div className="info-grid">
                                                    <div className="info-block">
                                                        <div className="info-label">model</div>
                                                        <div className="info-value">
                                                            {viewImage.modelLabel || "n/a"}
                                                        </div>
                                                    </div>
                                                    <div className="info-block">
                                                        <div className="info-label">created</div>
                                                        <div className="info-value">{viewImage.timestamp || "n/a"}</div>
                                                    </div>
                                                    {viewImage.ratio && (
                                                        <div className="info-block">
                                                            <div className="info-label">ratio</div>
                                                            <div className="info-value">{viewImage.ratio}</div>
                                                        </div>
                                                    )}
                                                    {viewImage.provider !== "sd" && viewImage.size && (
                                                        <div className="info-block">
                                                            <div className="info-label">resolution</div>
                                                            <div className="info-value">{viewImage.size}</div>
                                                        </div>
                                                    )}
                                                    {(viewImage.provider === "bria" || viewImage.provider === "sd") &&
                                                        viewImage.seed && (
                                                            <div className="info-block">
                                                                <div
                                                                    style={{
                                                                        display: "flex",
                                                                        justifyContent: "space-between",
                                                                        alignItems: "center",
                                                                    }}
                                                                >
                                                                    <div className="info-label">seed</div>
                                                                    <button
                                                                        className="info-copy-btn"
                                                                        onClick={(e) =>
                                                                            copyPrompt(String(viewImage.seed), e)
                                                                        }
                                                                    >
                                                                        copy
                                                                    </button>
                                                                </div>
                                                                <div
                                                                    className="info-value"
                                                                    style={{
                                                                        userSelect: "text",
                                                                        WebkitUserSelect: "text",
                                                                    }}
                                                                >
                                                                    {viewImage.seed}
                                                                </div>
                                                            </div>
                                                        )}
                                                    {(viewImage.provider === "bria" || viewImage.provider === "sd") &&
                                                        viewImage.steps && (
                                                            <div className="info-block">
                                                                <div className="info-label">steps</div>
                                                                <div className="info-value">{viewImage.steps}</div>
                                                            </div>
                                                        )}
                                                    {(viewImage.provider === "bria" || viewImage.provider === "sd") &&
                                                        viewImage.guidance && (
                                                            <div className="info-block">
                                                                <div className="info-label">guidance</div>
                                                                <div className="info-value">{viewImage.guidance}</div>
                                                            </div>
                                                        )}
                                                    {viewImage.provider === "sd" &&
                                                        viewImage.promptStrength != null && (
                                                            <div className="info-block">
                                                                <div className="info-label">strength</div>
                                                                <div className="info-value">
                                                                    {viewImage.promptStrength}
                                                                </div>
                                                            </div>
                                                        )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="drawer-foot">
                                        <button className="btn btn-dl" onClick={(e) => downloadImg(viewImage, e)}>
                                            download
                                        </button>
                                        <button className="btn btn-del-outline" onClick={() => deleteOne(viewImage.id)}>
                                            delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {reuseModal && (
                            <div
                                className={`reuse-modal-overlay${reuseClosing ? " closing" : ""}`}
                                onClick={closeReuse}
                            >
                                <div className="reuse-modal" onClick={(e) => e.stopPropagation()}>
                                    <div className="reuse-modal-title">reuse settings</div>
                                    <div className="reuse-modal-sub">choose what to apply</div>

                                    <div className="reuse-options">
                                        {Object.keys(reuseChecked).map((key) => (
                                            <label key={key} className="reuse-option">
                                                <input
                                                    type="checkbox"
                                                    checked={reuseChecked[key]}
                                                    onChange={() =>
                                                        setReuseChecked((prev) => ({ ...prev, [key]: !prev[key] }))
                                                    }
                                                />
                                                <div>
                                                    <div className="reuse-option-label">{key}</div>
                                                    <div className="reuse-option-value">
                                                        {String(reuseModal[key] ?? "")}
                                                    </div>
                                                </div>
                                            </label>
                                        ))}
                                    </div>

                                    <div className="modal-actions">
                                        <button className="btn btn-ghost" style={{ fontSize: 12 }} onClick={closeReuse}>
                                            cancel
                                        </button>
                                        <button
                                            className="btn btn-primary"
                                            style={{ fontSize: 12 }}
                                            onClick={() => {
                                                applyReuse();
                                                closeReuse();
                                            }}
                                        >
                                            apply
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {lightboxSrc && (
                            <div className="lightbox-overlay" onClick={() => setLightboxSrc(null)}>
                                <img src={lightboxSrc} draggable="false" onClick={(e) => e.stopPropagation()} />
                            </div>
                        )}

                        {confirm && (
                            <Confirm
                                title={confirm.title}
                                body={confirm.body}
                                confirmLabel={confirm.confirmLabel}
                                onConfirm={confirm.onConfirm}
                                onCancel={() => setConfirm(null)}
                            />
                        )}

                        <nav className="tab-bar">
                            <button
                                className={`tab-btn${mobileTab === "settings" ? " active" : ""}`}
                                onClick={() => setMobileTab("settings")}
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    strokeWidth="2.2"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    style={{ width: 21, height: 21 }}
                                >
                                    <circle cx="12" cy="12" r="3" />
                                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                                </svg>
                                settings
                            </button>
                            <button
                                className={`tab-btn${mobileTab === "gallery" ? " active" : ""}`}
                                onClick={() => setMobileTab("gallery")}
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    strokeWidth="2.2"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    style={{ width: 21, height: 21 }}
                                >
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="14" y="14" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                </svg>
                                gallery
                                {history.length > 0 && (
                                    <span style={{ fontSize: 10, color: "var(--text3)", marginTop: -2 }}>
                                        {history.length}
                                    </span>
                                )}
                            </button>
                        </nav>
                    </div>
                );
            }
            ReactDOM.createRoot(document.getElementById("root")).render(<App />);
        </script>
    </body>
</html>
